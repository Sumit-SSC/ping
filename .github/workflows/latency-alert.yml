name: Latency Spike Alerts

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  latency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Analyze latency
        id: analyze
        run: |
          mkdir -p .cache

          FILE="history/summary.json"
          ALERTS=""

          COUNT=$(jq length "$FILE")

          for i in $(seq 0 $(($COUNT - 1))); do
            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            [ "$STATUS" != "up" ] && continue

            JSON_FILE="history/$SLUG.json"
            [ ! -f "$JSON_FILE" ] && continue

            CURRENT=$(jq -r ".[-1].responseTime" "$JSON_FILE")
            HISTORY=$(jq -r ".[]?.responseTime" "$JSON_FILE" | tail -n 10)

            SUM=0
            COUNT_H=0

            for val in $HISTORY; do
              [[ "$val" =~ ^[0-9]+$ ]] && SUM=$((SUM + val)) && COUNT_H=$((COUNT_H + 1))
            done

            [ "$COUNT_H" -eq 0 ] && continue

            AVG=$((SUM / COUNT_H))
            THRESHOLD=$((AVG * 2))

            # persistence
            STATE_FILE=".cache/spike_$SLUG"
            PREV=0
            [ -f "$STATE_FILE" ] && PREV=$(cat "$STATE_FILE")

            SPIKE=0
            # if [ "$CURRENT" -gt "$THRESHOLD" ] && [ "$CURRENT" -gt 1000 ]; then
            if [ "$CURRENT" -gt 1 ]; then
              SPIKE=1
            fi

            echo "$SPIKE" > "$STATE_FILE"

            if [ "$SPIKE" -ne 1 ] || [ "$PREV" -ne 1 ]; then
              continue
            fi

            # cooldown (2h)
            COOLDOWN_FILE=".cache/alert_$SLUG"
            NOW=$(date +%s)

            if [ -f "$COOLDOWN_FILE" ]; then
              LAST=$(cat "$COOLDOWN_FILE")
              if [ $((NOW - LAST)) -lt 7200 ]; then
                continue
              fi
            fi

            echo "$NOW" > "$COOLDOWN_FILE"

            ALERTS+="🚨 Latency Spike (Persistent)\n"
            ALERTS+="🌐 $NAME\n"
            ALERTS+="⚡ Current: $CURRENT ms\n"
            ALERTS+="📊 Avg: $AVG ms\n"
            ALERTS+="📈 Deviation: $((CURRENT - AVG)) ms\n"
            ALERTS+="🔗 https://status.sumit.indevs.in/history/$SLUG\n\n"
          done

          if [ -n "$ALERTS" ]; then
            echo "alert=true" >> $GITHUB_OUTPUT
            echo "msg<<EOF" >> $GITHUB_OUTPUT
            echo -e "$ALERTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "alert=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram
        if: steps.analyze.outputs.alert == 'true'
        run: |
          MESSAGE="${{ steps.analyze.outputs.msg }}\n🕒 $(TZ='Asia/Kolkata' date +"%d %b %Y | %I:%M %p IST")"

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "$MESSAGE" \
            --argjson thread_id ${{ secrets.ALERTS_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
