# ==========================================
# ADVANCED LATENCY OBSERVABILITY SYSTEM
# ==========================================
#
# Purpose:
#
# Detects:
# ✅ latency degradation
# ✅ persistent spikes
# ✅ slow services
# ✅ DOWN services
# ✅ recovery events
# ✅ instability/jitter
#
# Sends:
# ✅ Telegram alerts
# ✅ weekly latency analytics
# ✅ recovery summaries
#
# ==========================================
# ARCHITECTURE
# ==========================================
#
# Upptime handles:
# - uptime checks
# - latency collection
# - history generation
#
# This workflow handles:
# - adaptive latency analysis
# - degradation scoring
# - observability reporting
# - Telegram notifications
#
# ==========================================
# REQUIRED GITHUB SECRETS
# ==========================================
#
# INCIDENT_BASE_URL
#   Base URL for incident pages.
#   Example:
#   https://status.example.com/incident
#
# STATUS_BASE_URL
#   Base URL for history pages.
#   Example:
#   https://status.example.com/history
#
# CHAT_ID
#   Telegram group/chat ID.
#
# ALERTS_TOPIC_ID
#   Telegram forum topic/thread ID.
#
# SUMMARY_BOT_TOKEN
#   Telegram bot token.
#
# SUMMARY_TIMEZONE
#   Display timezone for messages.
#
# Examples:
#   Asia/Kolkata
#   Asia/Tokyo
#   UTC
#
# ==========================================
# STATE FILES
# ==========================================
#
# history/latency-state.json
#
# Stores:
# - active alerts
# - cooldown timers
# - spike counters
# - recovery state
# - weekly metrics
#
# ==========================================
# CRON NOTES
# ==========================================
#
# GitHub cron uses UTC only.
#
# Current:
# */30 * * * *
# = every 30 minutes
#
# Weekly report:
# 0 3 * * 1
# = Monday 03:00 UTC
#
# ==========================================

name: Advanced Latency Observability

on:

  # ========================================
  # Latency analysis every 30 mins
  # ========================================
  schedule:
    - cron: "*/30 * * * *"

    # Weekly analytics report
    - cron: "0 3 * * 1"

  # ========================================
  # Manual trigger
  # ========================================
  workflow_dispatch:
    inputs:
      debug:
        description: "Force alerts for testing"
        required: false
        default: "false"

jobs:

  # ========================================
  # MAIN LATENCY ANALYSIS
  # ========================================

  latency-check:

    # Prevent weekly report trigger
    if: github.event.schedule != '0 3 * * 1'

    runs-on: ubuntu-latest

    steps:

      # ====================================
      # Checkout repository
      # ====================================

      - uses: actions/checkout@v4

      # ====================================
      # Initialize persistent state
      # ====================================

      - name: Initialize state
        run: |

          mkdir -p history

          if [ ! -f history/latency-state.json ]; then
            echo "{}" > history/latency-state.json
          fi

      # ====================================
      # Analyze latency
      # ====================================

      - name: Analyze latency
        id: analyze

        env:
          STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}
          SUMMARY_TIMEZONE: ${{ secrets.SUMMARY_TIMEZONE }}
          DEBUG_MODE: ${{ github.event.inputs.debug }}

        run: |

          FILE="history/summary.json"
          STATE_FILE="history/latency-state.json"

          TMP_ALERT=$(mktemp)
          TMP_INSIGHT=$(mktemp)

          NOW=$(date +%s)

          ALERT_BLOCK=""
          RECOVERY_BLOCK=""
          INSIGHT_BLOCK=""

          COUNT=$(jq length "$FILE")

          # ==================================
          # Iterate all services
          # ==================================

          for i in $(seq 0 $(($COUNT - 1))); do

            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            YML_FILE="history/$SLUG.yml"

            [ ! -f "$YML_FILE" ] && continue

            CURRENT=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')

            [ -z "$CURRENT" ] && CURRENT=99999

            # ==================================
            # DOWN site handling
            # ==================================

            if [ "$STATUS" != "up" ]; then

              LEVEL="🛑"
              SPEED="💀"

              AVG=0
              DEVIATION=999

              ALERT=1

            else

              # ==============================
              # Rolling latency history
              # ==============================

              HISTORY=$(grep 'responseTime:' "$YML_FILE" \
                | awk '{print $2}' \
                | tail -n 10)

              SUM=0
              COUNT_H=0

              for val in $HISTORY; do

                if [[ "$val" =~ ^[0-9]+$ ]]; then
                  SUM=$((SUM + val))
                  COUNT_H=$((COUNT_H + 1))
                fi

              done

              [ "$COUNT_H" -eq 0 ] && continue

              AVG=$((SUM / COUNT_H))

              # ==============================
              # TRUE deviation %
              #
              # Example:
              # avg=100 current=300
              # deviation=200%
              # ==============================

              if [ "$AVG" -gt 0 ]; then
                DEVIATION=$(((CURRENT - AVG) * 100 / AVG))
              else
                DEVIATION=0
              fi

              [ "$DEVIATION" -lt 0 ] && DEVIATION=0

              # ==============================
              # SPEED LADDER
              # ==============================

              if [ "$CURRENT" -lt 100 ]; then
                SPEED="⚡"
              elif [ "$CURRENT" -lt 250 ]; then
                SPEED="🚀"
              elif [ "$CURRENT" -lt 500 ]; then
                SPEED="✈️"
              elif [ "$CURRENT" -lt 750 ]; then
                SPEED="🏎️"
              elif [ "$CURRENT" -lt 1000 ]; then
                SPEED="🚗"
              elif [ "$CURRENT" -lt 1500 ]; then
                SPEED="🏇"
              elif [ "$CURRENT" -lt 2000 ]; then
                SPEED="🐢"
              else
                SPEED="🐌"
              fi

              # ==============================
              # ADAPTIVE SEVERITY MODEL
              #
              # Uses BOTH:
              # - relative degradation
              # - absolute latency
              # ==============================

              if [ "$DEVIATION" -lt 25 ]; then

                LEVEL="🟢"
                ALERT=0

              elif [ "$DEVIATION" -lt 75 ]; then

                LEVEL="⚠"
                ALERT=0

              elif [ "$DEVIATION" -lt 200 ]; then

                LEVEL="🚨"
                ALERT=1

              else

                LEVEL="🛑"
                ALERT=1

              fi

            fi

            # ==================================
            # Debug mode
            # ==================================

            if [ "$DEBUG_MODE" = "true" ]; then

              if [ "$CURRENT" -ge 200 ]; then
                ALERT=1
                LEVEL="🧪"
              else
                ALERT=0
              fi

            fi

            # ==================================
            # Consecutive spike validation
            #
            # Prevents noisy one-off spikes
            # ==================================

            PREV_SPIKES=$(jq -r ".\"$SLUG\".spikes // 0" "$STATE_FILE")

            if [ "$ALERT" -eq 1 ]; then
              SPIKES=$((PREV_SPIKES + 1))
            else
              SPIKES=0
            fi

            jq \
              --arg slug "$SLUG" \
              --argjson spikes "$SPIKES" \
              '.[$slug].spikes = $spikes' \
              "$STATE_FILE" > tmp.json && mv tmp.json "$STATE_FILE"

            if [ "$SPIKES" -lt 2 ] && [ "$DEBUG_MODE" != "true" ]; then
              continue
            fi

            # ==================================
            # Cooldown logic
            #
            # 3 hours
            # ==================================

            LAST_ALERT=$(jq -r ".\"$SLUG\".last_alert // 0" "$STATE_FILE")

            if [ "$DEBUG_MODE" != "true" ]; then

              if [ $((NOW - LAST_ALERT)) -lt 10800 ]; then
                continue
              fi

            fi

            # ==================================
            # Recovery detection
            # ==================================

            PREV_ACTIVE=$(jq -r ".\"$SLUG\".active // false" "$STATE_FILE")

            if [ "$ALERT" -eq 0 ] && [ "$PREV_ACTIVE" = "true" ]; then

              RECOVERY_BLOCK+="✅ Recovery Detected\n\n"

              RECOVERY_BLOCK+="🌐 $NAME\n"
              RECOVERY_BLOCK+="$SPEED Current: $CURRENT ms\n"
              RECOVERY_BLOCK+="📊 Avg: $AVG ms\n"
              RECOVERY_BLOCK+="📈 Deviation: ${DEVIATION}%\n"
              RECOVERY_BLOCK+="🔗 $STATUS_BASE_URL/$SLUG\n\n"

              jq \
                --arg slug "$SLUG" \
                '.[$slug].active = false' \
                "$STATE_FILE" > tmp.json && mv tmp.json "$STATE_FILE"

              continue

            fi

            # ==================================
            # Skip healthy services
            # ==================================

            [ "$ALERT" -ne 1 ] && continue

            # ==================================
            # Update alert state
            # ==================================

            jq \
              --arg slug "$SLUG" \
              --argjson now "$NOW" \
              '.[$slug].last_alert = $now |
               .[$slug].active = true |
               .[$slug].weekly_spikes += 1' \
              "$STATE_FILE" > tmp.json && mv tmp.json "$STATE_FILE"

            # ==================================
            # Store alert
            # ==================================

            echo "$CURRENT|$LEVEL|$SPEED|$NAME|$SLUG|$AVG|$DEVIATION" >> $TMP_ALERT

            # ==================================
            # Store insights
            # ==================================

            echo "$CURRENT|$SPEED|$NAME" >> $TMP_INSIGHT

          done

          # ==================================
          # Build alert section
          # ==================================

          if [ -s "$TMP_ALERT" ]; then

            SORTED=$(sort -nr $TMP_ALERT | head -n 3)

            ALERT_BLOCK="🚨 Critical Latency Alerts\n\n"

            INDEX=1

            while IFS="|" read -r CUR LEVEL SPEED NAME SLUG AVG DEV; do

              [ -z "$CUR" ] && continue

              ALERT_BLOCK+="$INDEX. $LEVEL $NAME\n"
              ALERT_BLOCK+="   $SPEED $CUR ms\n"
              ALERT_BLOCK+="   📊 Avg: $AVG ms\n"
              ALERT_BLOCK+="   📈 Deviation: +${DEV}%\n"
              ALERT_BLOCK+="   🔗 $STATUS_BASE_URL/$SLUG\n\n"

              INDEX=$((INDEX+1))

            done <<< "$SORTED"

            ALERT_BLOCK+="━━━━━━━━━━━━━━━━━━\n\n"

          fi

          # ==================================
          # Build performance insights
          # ==================================

          if [ -s "$TMP_INSIGHT" ]; then

            INSIGHT_BLOCK="📊 Performance Insights\n\n"

            SORTED_INSIGHT=$(sort -nr $TMP_INSIGHT | head -n 3)

            while IFS="|" read -r LAT SPEED NAME; do

              [ -z "$LAT" ] && continue

              INSIGHT_BLOCK+="🌐 $NAME\n"
              INSIGHT_BLOCK+="$SPEED $LAT ms\n\n"

            done <<< "$SORTED_INSIGHT"

          fi

          # ==================================
          # Final Telegram message
          # ==================================

          FINAL=""

          [ -n "$ALERT_BLOCK" ] && FINAL+="$ALERT_BLOCK"

          [ -n "$RECOVERY_BLOCK" ] && FINAL+="$RECOVERY_BLOCK"

          [ -n "$INSIGHT_BLOCK" ] && FINAL+="$INSIGHT_BLOCK"

          # Prevent empty reports
          if [ -z "$FINAL" ]; then
            FINAL="🟢 No significant latency anomalies detected."
          fi

          LOCAL_TIME=$(TZ="$SUMMARY_TIMEZONE" \
            date +"%d %b %Y | %I:%M %p %Z")

          UTC_TIME=$(TZ="UTC" \
            date +"%H:%M UTC")

          FINAL+="\n🕒 $LOCAL_TIME"
          FINAL+="\n🌍 $UTC_TIME"

          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FINAL" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ====================================
      # Send Telegram alert
      # ====================================

      - name: Send Telegram
        run: |

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.analyze.outputs.msg }}" \
            --argjson thread_id ${{ secrets.ALERTS_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # ====================================
      # Persist latency state
      # ====================================

      - name: Commit state
        run: |

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add history/latency-state.json

          git diff --cached --quiet || \
            git commit -m "Update latency observability state"

          git push

  # ========================================
  # WEEKLY LATENCY ANALYTICS REPORT
  # ========================================

  weekly-report:

    if: github.event.schedule == '0 3 * * 1'

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build weekly report
        id: report

        env:
          SUMMARY_TIMEZONE: ${{ secrets.SUMMARY_TIMEZONE }}

        run: |

          FILE="history/latency-state.json"

          REPORT="📊 Weekly Latency Report\n\n"

          TOP=$(jq -r '
            to_entries
            | sort_by(-(.value.weekly_spikes // 0))
            | .[:5]
            | .[]
            | "\(.key)|\(.value.weekly_spikes // 0)"
          ' "$FILE")

          INDEX=1

          while IFS="|" read -r SITE SPIKES; do

            [ -z "$SITE" ] && continue

            REPORT+="$INDEX. 🌐 $SITE\n"
            REPORT+="   🚨 Spike Events: $SPIKES\n\n"

            INDEX=$((INDEX+1))

          done <<< "$TOP"

          LOCAL_TIME=$(TZ="$SUMMARY_TIMEZONE" \
            date +"%d %b %Y | %I:%M %p %Z")

          REPORT+="🕒 $LOCAL_TIME"

          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ====================================
      # Send weekly report
      # ====================================

      - name: Send Telegram
        run: |

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.report.outputs.msg }}" \
            --argjson thread_id ${{ secrets.ALERTS_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
