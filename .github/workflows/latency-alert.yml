# ==========================================
# ADVANCED LATENCY OBSERVABILITY SYSTEM
# ==========================================
#
# Purpose:
#
# Detects:
# ✅ latency degradation
# ✅ persistent spikes
# ✅ slow services
# ✅ DOWN services
# ✅ recovery events
# ✅ instability/jitter
#
# Sends:
# ✅ Telegram alerts
# ✅ weekly latency analytics
# ✅ recovery summaries
#
# ==========================================
# ARCHITECTURE
# ==========================================
#
# Upptime handles:
# - uptime checks
# - latency collection
# - history generation
#
# This workflow handles:
# - adaptive latency analysis
# - degradation scoring
# - observability reporting
# - Telegram notifications
#
# ==========================================
# REQUIRED GITHUB SECRETS
# ==========================================
#
# INCIDENT_BASE_URL
#   Base URL for incident pages.
#   Example:
#   https://status.example.com/incident
#
# STATUS_BASE_URL
#   Base URL for history pages.
#   Example:
#   https://status.example.com/history
#
# CHAT_ID
#   Telegram group/chat ID.
#   Example:
#   -1001234567890
#
# TOPIC_ID
#   Telegram forum topic/thread ID.
#   Example:
#   12
#
# SUMMARY_BOT_TOKEN
#   Telegram bot token.
#   Example:
#   123456789:AAExampleBotTokenHere
#
# SUMMARY_TIMEZONE
#   Display timezone for messages.
#   Examples:
#   Asia/Kolkata
#   Asia/Tokyo
#   UTC
#
# ==========================================
# STATE FILES
# ==========================================
#
# history/latency-state.json
#
# Stores:
# - active alerts
# - cooldown timers
# - spike counters
# - recovery state
# - weekly metrics
#
# ==========================================
# CRON NOTES
# ==========================================
# ==========================================
# CRON NOTES
# ==========================================
#
# GitHub Actions cron uses UTC ONLY.
#
# IST = UTC + 5:30
#
# Examples:
#
# 02:30 UTC = 08:00 AM IST
# 03:00 UTC = 08:30 AM IST
#
# Cron helper:
# https://crontab.guru/
#
# Timezone converter:
# https://www.worldtimebuddy.com/
#
# IMPORTANT:
# GitHub scheduled workflows may delay
# by several minutes during high load.
#
# -------------------------------------
# Current:
# -------------------------------------
# Every 30 minutes:
#
# */30 * * * *
#
# -------------------------------------
# Weekly report:
# -------------------------------------
# 0 3 * * 1
# = Monday 03:00 UTC
#
# ==========================================
# IMPORTANT NOTES
# ==========================================
#
# This workflow DOES NOT simply detect:
#   "high latency"
#
# Instead it detects:
#   abnormal deviation from historical baseline
#
# Example:
#
# Google:
#   avg = 70ms
#   current = 180ms
#   => severe degradation
#
# Streamio:
#   avg = 1100ms
#   current = 1200ms
#   => normal behavior

# ==========================================
# Actual Working Code ⬇️
# ==========================================

name: Advanced Latency Observability

concurrency:
  group: latency-observability
  cancel-in-progress: false

on:

  schedule:
    - cron: "*/30 * * * *"

    # Weekly analytics
    - cron: "0 3 * * 1"

  workflow_dispatch:
    inputs:
      debug:
        description: "Force alerts for testing"
        required: false
        default: "false"

jobs:

  # ========================================
  # MAIN LATENCY ANALYSIS
  # ========================================

  latency-check:

    if: github.event.schedule != '0 3 * * 1'

    runs-on: ubuntu-latest

    env:
      STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}
      SUMMARY_TIMEZONE: ${{ secrets.SUMMARY_TIMEZONE }}
      DEBUG_MODE: ${{ github.event.inputs.debug }}

    steps:

      # ====================================
      # Checkout repository
      # ====================================

      - name: Checkout repository
        uses: actions/checkout@v4

      # ====================================
      # Initialize persistent DBs
      # ====================================

      - name: Initialize latency DBs
        run: |

          mkdir -p history

          if [ ! -f history/latency-state.json ]; then
            echo "{}" > history/latency-state.json
          fi

          if [ ! -f history/latency-history.json ]; then
            echo "{}" > history/latency-history.json
          fi

      # ====================================
      # Analyze latency
      # ====================================

      - name: Analyze latency
        id: analyze

        run: |

          FILE="history/summary.json"
          DB="history/latency-state.json"
          HISTORY_DB="history/latency-history.json"

          TMP_ALERT=$(mktemp)
          TMP_INSIGHT=$(mktemp)
          TMP_RECOVERY=$(mktemp)

          NOW=$(date +%s)

          COUNT=$(jq length "$FILE")

          ACTIVE_ALERTS=0

          # ==================================
          # Iterate services
          # ==================================

          for i in $(seq 0 $(($COUNT - 1))); do

            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            YML_FILE="history/$SLUG.yml"

            [ ! -f "$YML_FILE" ] && continue

            # ==================================
            # Current latency
            # ==================================

            CURRENT=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')

            [ -z "$CURRENT" ] && CURRENT=99999

            # ==================================
            # Persistent rolling history
            # ==================================

            EXISTING=$(jq -r \
              --arg slug "$SLUG" \
              '.[$slug] // [] | join(" ")' \
              "$HISTORY_DB")

            UPDATED="$EXISTING $CURRENT"

            # Keep last 20 samples only
            TRIMMED=$(echo "$UPDATED" | awk '{
              for(i=NF-19;i<=NF;i++)
                if(i>0) printf $i " "
            }')

            jq \
              --arg slug "$SLUG" \
              --arg values "$TRIMMED" \
              '.[$slug] = ($values | split(" ") | map(select(length > 0) | tonumber))' \
              "$HISTORY_DB" > tmp.json && mv tmp.json "$HISTORY_DB"

            HISTORY=$(jq -r \
              --arg slug "$SLUG" \
              '.[$slug][]' \
              "$HISTORY_DB")

            SUM=0
            COUNT_H=0

            for val in $HISTORY; do

              if [[ "$val" =~ ^[0-9]+$ ]]; then

                SUM=$((SUM + val))
                COUNT_H=$((COUNT_H + 1))

              fi

            done

            [ "$COUNT_H" -eq 0 ] && continue

            AVG=$((SUM / COUNT_H))

            [ "$AVG" -le 0 ] && AVG=1

            # ==================================
            # DOWN state handling
            # ==================================

            if [ "$STATUS" != "up" ]; then

              LEVEL="🛑"
              SPEED="💀"

              DEV=999
              ALERT=1
              JITTER="Critical"

            else

              # ==============================
              # TRUE deviation
              # ==============================

              DEV=$(( ((CURRENT - AVG) * 100) / AVG ))

              [ "$DEV" -lt 0 ] && DEV=0

              # ==============================
              # Jitter classification
              # ==============================

              if [ "$DEV" -lt 25 ]; then
                JITTER="Stable"
              elif [ "$DEV" -lt 75 ]; then
                JITTER="Moderate"
              elif [ "$DEV" -lt 150 ]; then
                JITTER="Unstable"
              else
                JITTER="Severe"
              fi

              # ==============================
              # Speed ladder
              # ==============================

              if [ "$CURRENT" -lt 100 ]; then
                SPEED="⚡"
              elif [ "$CURRENT" -lt 250 ]; then
                SPEED="🚀"
              elif [ "$CURRENT" -lt 500 ]; then
                SPEED="✈️"
              elif [ "$CURRENT" -lt 750 ]; then
                SPEED="🏎️"
              elif [ "$CURRENT" -lt 1000 ]; then
                SPEED="🚗"
              elif [ "$CURRENT" -lt 1500 ]; then
                SPEED="🏇"
              elif [ "$CURRENT" -lt 2000 ]; then
                SPEED="🐢"
              else
                SPEED="🐌"
              fi

              # ==============================
              # Adaptive severity
              # ==============================

              if [ "$DEV" -lt 25 ]; then

                LEVEL="🟢"
                ALERT=0

              elif [ "$DEV" -lt 75 ]; then

                LEVEL="⚠️"
                ALERT=0

              elif [ "$DEV" -lt 200 ]; then

                LEVEL="🚨"
                ALERT=1

              else

                LEVEL="🛑"
                ALERT=1

              fi

            fi

            # ==================================
            # Debug override
            # ==================================

            if [ "$DEBUG_MODE" = "true" ]; then

              if [ "$CURRENT" -ge 200 ]; then

                ALERT=1
                LEVEL="🧪"
                JITTER="Debug/Test Mode"

              else

                ALERT=0

              fi

            fi

            # ==================================
            # Persistent metrics
            # ==================================

            SPIKES=$(jq -r \
              --arg slug "$SLUG" \
              '.[$slug].spikes // 0' \
              "$DB")

            WEEKLY=$(jq -r \
              --arg slug "$SLUG" \
              '.[$slug].weekly_spikes // 0' \
              "$DB")

            PREV_ACTIVE=$(jq -r \
              --arg slug "$SLUG" \
              '.[$slug].active // false' \
              "$DB")

            LAST_ALERT=$(jq -r \
              --arg slug "$SLUG" \
              '.[$slug].last_alert // 0' \
              "$DB")

            # ==================================
            # Consecutive spike validation
            # ==================================

            if [ "$ALERT" -eq 1 ]; then
              SPIKES=$((SPIKES + 1))
            else
              SPIKES=0
            fi

            jq \
              --arg slug "$SLUG" \
              --argjson spikes "$SPIKES" \
              '.[$slug].spikes = $spikes' \
              "$DB" > tmp.json && mv tmp.json "$DB"

            if [ "$SPIKES" -lt 2 ] && [ "$DEBUG_MODE" != "true" ]; then
              continue
            fi

            # ==================================
            # Cooldown (3 hrs)
            # ==================================

            if [ "$DEBUG_MODE" != "true" ]; then

              if [ "$LAST_ALERT" -gt 0 ]; then

                GAP=$((NOW - LAST_ALERT))

                if [ "$GAP" -lt 10800 ]; then
                  continue
                fi

              fi

            fi

            # ==================================
            # Recovery detection
            # ==================================

            if [ "$ALERT" -eq 0 ] && [ "$PREV_ACTIVE" = "true" ]; then

              echo "$NAME|$CURRENT|$AVG|$DEV|$SPEED|$SLUG" >> "$TMP_RECOVERY"

              jq \
                --arg slug "$SLUG" \
                '.[$slug].active = false' \
                "$DB" > tmp.json && mv tmp.json "$DB"

              continue

            fi

            # ==================================
            # Skip healthy
            # ==================================

            [ "$ALERT" -ne 1 ] && continue

            if [ "$DEBUG_MODE" != "true" ]; then
              ACTIVE_ALERTS=$((ACTIVE_ALERTS + 1))
            fi

            # ==================================
            # Update DB state
            # ==================================

            WEEKLY=$((WEEKLY + 1))

            jq \
              --arg slug "$SLUG" \
              --argjson now "$NOW" \
              --argjson avg "$AVG" \
              --argjson dev "$DEV" \
              --argjson weekly "$WEEKLY" \
              '.[$slug].last_alert = $now |
               .[$slug].active = true |
               .[$slug].avg = $avg |
               .[$slug].deviation = $dev |
               .[$slug].weekly_spikes = $weekly' \
              "$DB" > tmp.json && mv tmp.json "$DB"

            # ==================================
            # Alert telemetry
            # ==================================

            echo "$DEV|$LEVEL|$SPEED|$NAME|$SLUG|$CURRENT|$AVG|$JITTER" \
              >> "$TMP_ALERT"

            # ==================================
            # Insights telemetry
            # ==================================

            echo "$CURRENT|$SPEED|$NAME" >> "$TMP_INSIGHT"

          done

          # ==================================
          # Build alert block
          # ==================================

          FINAL=""

          if [ -s "$TMP_ALERT" ]; then

            ALERTS=$(sort -nr "$TMP_ALERT" | head -n 5)

            FINAL+="🚨 Latency Observability Alerts\n\n"

            INDEX=1

            while IFS="|" read -r DEV LEVEL SPEED NAME SLUG CUR AVG JITTER; do

              [ -z "$NAME" ] && continue

              FINAL+="$INDEX. $LEVEL $NAME\n"
              FINAL+="   $SPEED $CUR ms\n"
              FINAL+="   📊 Rolling Avg: $AVG ms\n"
              FINAL+="   📈 Deviation: +${DEV}%\n"
              FINAL+="   📡 Jitter: $JITTER\n"
              FINAL+="   🔗 $STATUS_BASE_URL/$SLUG\n\n"

              INDEX=$((INDEX + 1))

            done <<< "$ALERTS"

          fi

          # ==================================
          # Recovery telemetry
          # ==================================

          if [ -s "$TMP_RECOVERY" ]; then

            FINAL+="━━━━━━━━━━━━━━━━━━\n\n"
            FINAL+="✅ Recovery Telemetry\n\n"

            while IFS="|" read -r NAME CUR AVG DEV SPEED SLUG; do

              [ -z "$NAME" ] && continue

              FINAL+="🌐 $NAME\n"
              FINAL+="📉 Latency normalized\n"
              FINAL+="$SPEED Current: $CUR ms\n"
              FINAL+="📊 Avg: $AVG ms\n"
              FINAL+="📈 Deviation: ${DEV}%\n"
              FINAL+="🔗 $STATUS_BASE_URL/$SLUG\n\n"

            done < "$TMP_RECOVERY"

          fi

          # ==================================
          # Performance insights
          # ==================================

          if [ -s "$TMP_INSIGHT" ]; then

            FINAL+="━━━━━━━━━━━━━━━━━━\n\n"
            FINAL+="📊 Performance Insights\n\n"

            SORTED_INSIGHT=$(sort -nr "$TMP_INSIGHT" | head -n 3)

            while IFS="|" read -r LAT SPEED NAME; do

              [ -z "$LAT" ] && continue

              FINAL+="🌐 $NAME\n"
              FINAL+="$SPEED $LAT ms\n\n"

            done <<< "$SORTED_INSIGHT"

          fi

          # ==================================
          # Infrastructure latency state
          # ==================================

          FINAL+="━━━━━━━━━━━━━━━━━━\n\n"
          FINAL+="📡 Infrastructure Latency State\n\n"

          if [ "$ACTIVE_ALERTS" -ge 3 ]; then
            STATE="Critical degradation"
          elif [ "$ACTIVE_ALERTS" -ge 1 ]; then
            STATE="Moderate degradation"
          else
            STATE="Stable"
          fi

          FINAL+="• $STATE\n"
          FINAL+="• Active degraded services: $ACTIVE_ALERTS\n"
          FINAL+="• Adaptive anomaly detection operational\n"
          FINAL+="• Rolling baseline telemetry active\n"

          if [ -z "$FINAL" ]; then
            FINAL="🟢 No significant latency anomalies detected."
          fi

          LOCAL_TIME=$(TZ="$SUMMARY_TIMEZONE" \
            date +"%d %b %Y | %I:%M %p %Z")

          UTC_TIME=$(TZ="UTC" \
            date +"%H:%M UTC")

          FINAL+="\n\n🕒 $LOCAL_TIME | "
          FINAL+="🌍 $UTC_TIME"

          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FINAL" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ====================================
      # Send Telegram alert
      # ====================================

      - name: Send Telegram alert

        run: |

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.analyze.outputs.msg }}" \
            --argjson thread_id ${{ secrets.ALERTS_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # ====================================
      # Persist state safely
      # ====================================

      - name: Persist latency state

        run: |

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add history/latency-state.json
          git add history/latency-history.json

          git diff --cached --quiet && exit 0

          git commit -m "Update latency observability state"

          for i in 1 2 3; do

            git pull --rebase origin master || true

            if git push origin master; then
              exit 0
            fi

            sleep 3

          done

          exit 1
