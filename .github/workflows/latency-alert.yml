name: Latency Spike Alerts (Smart + Trends)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  latency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Analyze latency
        id: analyze
        env:
          STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}
        run: |
          mkdir -p .cache

          FILE="history/summary.json"
          ALERTS=""
          TOP_LIST=""

          COUNT=$(jq length "$FILE")

          # temp storage for sorting
          TMP_FILE=$(mktemp)

          for i in $(seq 0 $(($COUNT - 1))); do
            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            [ "$STATUS" != "up" ] && continue

            YML_FILE="history/$SLUG.yml"
            [ ! -f "$YML_FILE" ] && continue

            CURRENT=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')
            [ -z "$CURRENT" ] && continue

            echo "$CURRENT|$NAME|$SLUG" >> $TMP_FILE

            # =============================
            # 📈 TREND DETECTION
            # =============================
            TREND_FILE=".cache/trend_$SLUG"
            PREV=0
            [ -f "$TREND_FILE" ] && PREV=$(cat "$TREND_FILE")

            DIFF=$((CURRENT - PREV))
            echo "$CURRENT" > "$TREND_FILE"

            if [ "$PREV" -ne 0 ] && [ "$DIFF" -gt 500 ]; then
              ALERTS+="📈 Rising Latency\n"
              ALERTS+="🌐 $NAME\n"
              ALERTS+="⚡ $CURRENT ms (+$DIFF)\n"
              ALERTS+="🔗 $STATUS_BASE_URL/$SLUG\n\n"
            fi

            # =============================
            # 🎯 SPIKE CLASSIFICATION
            # =============================
            if [ "$CURRENT" -lt 150 ]; then
              continue
            elif [ "$CURRENT" -lt 500 ]; then
              continue
            elif [ "$CURRENT" -lt 1000 ]; then
              continue
            elif [ "$CURRENT" -lt 2500 ]; then
              LEVEL="🚨 High Spike"
            else
              LEVEL="🛑 Severe Spike"
            fi

            # cooldown
            COOLDOWN_FILE=".cache/alert_$SLUG"
            NOW=$(date +%s)

            if [ -f "$COOLDOWN_FILE" ]; then
              LAST=$(cat "$COOLDOWN_FILE")
              if [ $((NOW - LAST)) -lt 7200 ]; then
                continue
              fi
            fi

            echo "$NOW" > "$COOLDOWN_FILE"

            ALERTS+="$LEVEL\n"
            ALERTS+="🌐 $NAME\n"
            ALERTS+="⚡ $CURRENT ms\n"
            ALERTS+="🔗 $STATUS_BASE_URL/$SLUG\n\n"

          done

          # =============================
          # 🏆 TOP 3 SLOWEST SERVICES
          # =============================
          TOP3=$(sort -nr $TMP_FILE | head -n 3)

          if [ -n "$TOP3" ]; then
            TOP_LIST="🏆 Top Slowest Services\n\n"

            while IFS="|" read -r LAT NAME SLUG; do
              TOP_LIST+="🌐 $NAME\n⚡ $LAT ms\n\n"
            done <<< "$TOP3"
          fi

          FINAL_MSG=""

          [ -n "$ALERTS" ] && FINAL_MSG+="🚨 Alerts\n\n$ALERTS"
          [ -n "$TOP_LIST" ] && FINAL_MSG+="━━━━━━━━━━━━━━━━━━\n\n$TOP_LIST"

          if [ -n "$FINAL_MSG" ]; then
            echo "alert=true" >> $GITHUB_OUTPUT
            echo "msg<<EOF" >> $GITHUB_OUTPUT
            echo -e "$FINAL_MSG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "alert=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram
        if: steps.analyze.outputs.alert == 'true'
        run: |
          MESSAGE="${{ steps.analyze.outputs.msg }}\n 🕒 $(TZ='Asia/Kolkata' date +"%d %b %Y | %I:%M %p IST")"

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "$MESSAGE" \
            --argjson thread_id ${{ secrets.ALERTS_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
