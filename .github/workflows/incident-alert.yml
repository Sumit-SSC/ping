# ==========================================
# ADVANCED INCIDENT ALERT SYSTEM
# ==========================================
#
# Purpose:
#
# Sends Telegram alerts for:
# ✅ Service outages
# ✅ Service recovery
# ✅ Incident metrics
# ✅ MTTR tracking
# ✅ flapping detection
# ✅ jitter / instability analysis
# ✅ weekly analytics reporting
#
# Built around Upptime issue lifecycle.
#
# ==========================================
# ARCHITECTURE
# ==========================================
#
# Architecture:
#
# Upptime handles:
# - site checks
# - issue creation
# - issue closure
# - uptime tracking
# - history generation
#
# This workflow handles:
# - Telegram notifications
# - MTTR tracking
# - incident analytics
# - recovery summaries
# - degradation analysis
# - weekly reporting
# - persistent metrics
#
# ==========================================
# REQUIRED GITHUB SECRETS
# ==========================================
#
# INCIDENT_BASE_URL
#   Base URL for incident pages.
#   Example:
#   https://status.example.com/incident
#
# STATUS_BASE_URL
#   Base URL for history pages.
#   Example:
#   https://status.example.com/history
#
# CHAT_ID
#   Telegram group/chat ID.
#   Example:
#   -1001234567890
#
# TOPIC_ID
#   Telegram forum topic/thread ID.
#   Example:
#   12
#
# SUMMARY_BOT_TOKEN
#   Telegram bot token.
#   Example:
#   123456789:AAExampleBotTokenHere
#
# SUMMARY_TIMEZONE
#   Display timezone for messages.
#   Examples:
#   Asia/Kolkata
#   Asia/Tokyo
#   UTC
#
# ==========================================
# CRON NOTES
# ==========================================
#
# GitHub Actions cron uses UTC ONLY.
#
# IST = UTC + 5:30
#
# Examples:
#
# 02:30 UTC = 08:00 AM IST
# 03:00 UTC = 08:30 AM IST
#
# Cron helper:
# https://crontab.guru/
#
# Timezone converter:
# https://www.worldtimebuddy.com/
#
# IMPORTANT:
# GitHub scheduled workflows may delay
# by several minutes during high load.
#
# -------------------------------------
# Current:
# -------------------------------------
# Weekly Report Every Monday 03:00 UTC
# "0 3 * * 1"
#
# While the Incdient alert is triggered as issue 
# gets posted automatically and not cron based.
#
#
# ==========================================
# IMPORTANT NOTES
# ==========================================
#
# 1. Scheduled workflows ONLY run on the
#    repository DEFAULT branch.
#
# 2. GitHub cron may delay several minutes.
#
# 3. Workflow uses concurrency locking to
#    avoid metrics corruption.
#
# ==========================================
# STATE FILES
# ==========================================
#
# observability/incident-metrics.json
#
# Stores:
# - incident counts
# - total downtime
# - MTTR values
# - historical metrics
# - weekly metrics
# - flap counters
# - active state
#
# This file persists across workflow runs.
#
# ==========================================
# FEATURES
# ==========================================
#
# ✅ Incident open alerts
# ✅ Recovery alerts
# ✅ Downtime duration tracking
# ✅ MTTR tracking
# ✅ Incident frequency tracking
# ✅ Weekly reporting
# ✅ Severity classification
# ✅ Speed ladder integration
# ✅ Jitter / degradation indicators
# ✅ Telegram integration
# ✅ Persistent metrics storage
#
# ==========================================
# Actual Working Code ⬇️
# ==========================================

name: Incident Observability

# ==========================================
# Prevent simultaneous writes
# ==========================================

concurrency:
  group: incident-observability
  cancel-in-progress: false

on:

  # ========================================
  # Event-driven monitoring
  # ========================================

  issues:
    types:
      - opened
      - closed

  # ========================================
  # Weekly analytics report
  # Monday 03:00 UTC
  # ========================================

  schedule:
    - cron: "0 3 * * 1"

  # ========================================
  # Manual trigger
  # ========================================

  workflow_dispatch:

jobs:

  # ========================================
  # INCIDENT ALERTS
  # ========================================

  incident-alert:

    if: github.event_name == 'issues'

    runs-on: ubuntu-latest

    steps:

      # ====================================
      # Checkout repo
      # ====================================

      - name: Checkout repository
        uses: actions/checkout@v4

      # ====================================
      # Initialize metrics DB
      # ====================================

      - name: Initialize metrics
        run: |

          mkdir -p observability

          if [ ! -f observability/incident-metrics.json ]; then
            echo "{}" > observability/incident-metrics.json
          fi

      # ====================================
      # Filter Upptime issues only
      # ====================================

      - name: Filter issues
        id: filter

        run: |

          TITLE="${{ github.event.issue.title }}"

          if [[ "$TITLE" == *"down"* ]] || [[ "$TITLE" == *"up"* ]]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if irrelevant
        if: steps.filter.outputs.valid != 'true'
        run: exit 0

      # ====================================
      # Build alert
      # ====================================

      - name: Build incident alert
        id: build

        env:
          INCIDENT_BASE_URL: ${{ secrets.INCIDENT_BASE_URL }}
          STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}
          SUMMARY_TIMEZONE: ${{ secrets.SUMMARY_TIMEZONE }}

        run: |

          TITLE="${{ github.event.issue.title }}"
          ACTION="${{ github.event.action }}"
          NUMBER="${{ github.event.issue.number }}"

          CREATED="${{ github.event.issue.created_at }}"
          CLOSED="${{ github.event.issue.closed_at }}"

          INCIDENT_URL="$INCIDENT_BASE_URL/$NUMBER"

          FILE="history/summary.json"
          DB="observability/incident-metrics.json"

          # ==================================
          # Clean site name
          # ==================================

          SITE=$(echo "$TITLE" \
            | sed -E 's/\[.*\]//g' \
            | sed -E 's/^[^[:alnum:]]+//' \
            | sed -E 's/ is down.*//; s/ is up.*//' \
            | xargs)

          # ==================================
          # Lookup slug
          # ==================================

          SLUG=$(jq -r \
            --arg site "$SITE" \
            '.[] | select(.name == $site) | .slug' \
            "$FILE")

          if [ -z "$SLUG" ] || [ "$SLUG" = "null" ]; then

            SLUG=$(echo "$SITE" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/ /-/g')

          fi

          STATUS_URL="$STATUS_BASE_URL/$SLUG"

          # ==================================
          # Read latest latency
          # ==================================

          YML_FILE="history/$SLUG.yml"

          LATENCY="unknown"

          if [ -f "$YML_FILE" ]; then
            LATENCY=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')
          fi

          # ==================================
          # Speed ladder
          # ==================================

          if [[ "$LATENCY" =~ ^[0-9]+$ ]]; then

            if [ "$LATENCY" -lt 100 ]; then
              SPEED="⚡"
            elif [ "$LATENCY" -lt 250 ]; then
              SPEED="🚀"
            elif [ "$LATENCY" -lt 500 ]; then
              SPEED="✈️"
            elif [ "$LATENCY" -lt 750 ]; then
              SPEED="🏎️"
            elif [ "$LATENCY" -lt 1000 ]; then
              SPEED="🚗"
            elif [ "$LATENCY" -lt 1500 ]; then
              SPEED="🏇"
            elif [ "$LATENCY" -lt 2000 ]; then
              SPEED="🐢"
            else
              SPEED="🐌"
            fi

          else

            SPEED="⚠"

          fi

          # ==================================
          # Uptime snapshot
          # ==================================

          UPTIME=$(jq -r \
            --arg site "$SITE" \
            '.[] | select(.name == $site) | .uptime' \
            "$FILE")

          if [ -z "$UPTIME" ] || [ "$UPTIME" = "null" ]; then
            UPTIME="Unknown"
          fi

          # ==================================
          # Downtime duration
          # ==================================

          DIFF=0
          DURATION="N/A"

          if [ "$ACTION" = "closed" ]; then

            START=$(date -d "$CREATED" +%s)
            END=$(date -d "$CLOSED" +%s)

            DIFF=$((END - START))

            HOURS=$((DIFF / 3600))
            MINS=$(((DIFF % 3600) / 60))

            if [ "$HOURS" -gt 0 ]; then
              DURATION="${HOURS}h ${MINS}m"
            else
              DURATION="${MINS} mins"
            fi

          fi

          # ==================================
          # Jitter / instability
          # ==================================

          JITTER="Stable"

          if [[ "$LATENCY" =~ ^[0-9]+$ ]]; then

            AVG=$((LATENCY))

            if [ "$LATENCY" -gt 2000 ]; then
              JITTER="High instability"
            elif [ "$LATENCY" -gt 1000 ]; then
              JITTER="Degraded"
            elif [ "$LATENCY" -gt 500 ]; then
              JITTER="Moderate"
            fi

          fi

          # ==================================
          # Severity escalation
          # ==================================

          if [ "$ACTION" = "opened" ]; then

            SEVERITY="⚠ Minor Incident"

            if [[ "$LATENCY" =~ ^[0-9]+$ ]]; then

              if [ "$LATENCY" -gt 2500 ]; then
                SEVERITY="🛑 Critical Incident"
              elif [ "$LATENCY" -gt 1000 ]; then
                SEVERITY="🚨 Major Incident"
              fi

            else

              SEVERITY="🛑 Critical Incident"

            fi

          else

            SEVERITY="✅ Recovery"

            if [ "$DIFF" -gt 3600 ]; then
              SEVERITY="🛑 Critical Recovery"
            elif [ "$DIFF" -gt 900 ]; then
              SEVERITY="🚨 Major Recovery"
            fi

          fi

          # ==================================
          # Persistent metrics
          # ==================================

          INCIDENTS=$(jq -r \
            --arg slug "$SLUG" \
            '.[$slug].incidents // 0' \
            "$DB")

          WEEKLY=$(jq -r \
            --arg slug "$SLUG" \
            '.[$slug].weekly // 0' \
            "$DB")

          FLAPS=$(jq -r \
            --arg slug "$SLUG" \
            '.[$slug].flaps // 0' \
            "$DB")

          TOTAL_DOWNTIME=$(jq -r \
            --arg slug "$SLUG" \
            '.[$slug].downtime // 0' \
            "$DB")

          ACTIVE=$(jq -r \
            --arg slug "$SLUG" \
            '.[$slug].active // false' \
            "$DB")

          # ==================================
          # Flapping detection
          # ==================================

          LAST_INCIDENT=$(jq -r \
            --arg slug "$SLUG" \
            '.[$slug].last_incident // 0' \
            "$DB")

          NOW=$(date +%s)

          if [ "$LAST_INCIDENT" -gt 0 ]; then

            GAP=$((NOW - LAST_INCIDENT))

            if [ "$GAP" -lt 7200 ]; then
              FLAPS=$((FLAPS + 1))
            fi

          fi

          # ==================================
          # Update metrics on recovery
          # ==================================

          if [ "$ACTION" = "closed" ]; then

            INCIDENTS=$((INCIDENTS + 1))
            WEEKLY=$((WEEKLY + 1))

            TOTAL_DOWNTIME=$((TOTAL_DOWNTIME + DIFF))

            MTTR=$((TOTAL_DOWNTIME / INCIDENTS))

            jq \
              --arg slug "$SLUG" \
              --argjson incidents "$INCIDENTS" \
              --argjson weekly "$WEEKLY" \
              --argjson flaps "$FLAPS" \
              --argjson downtime "$TOTAL_DOWNTIME" \
              --argjson mttr "$MTTR" \
              --argjson now "$NOW" \
              '.[$slug].incidents = $incidents |
               .[$slug].weekly = $weekly |
               .[$slug].flaps = $flaps |
               .[$slug].downtime = $downtime |
               .[$slug].mttr = $mttr |
               .[$slug].active = false |
               .[$slug].last_incident = $now' \
              "$DB" > tmp.json && mv tmp.json "$DB"

          else

            MTTR=$(jq -r \
              --arg slug "$SLUG" \
              '.[$slug].mttr // 0' \
              "$DB")

            jq \
              --arg slug "$SLUG" \
              --argjson now "$NOW" \
              '.[$slug].active = true |
               .[$slug].last_incident = $now' \
              "$DB" > tmp.json && mv tmp.json "$DB"

          fi

          MTTR_MIN=$((MTTR / 60))

          # ==================================
          # Recovery quality
          # ==================================

          RECOVERY_STATE="Healthy"

          if [ "$ACTION" = "closed" ]; then

            if [[ "$LATENCY" =~ ^[0-9]+$ ]]; then

              if [ "$LATENCY" -gt 2000 ]; then
                RECOVERY_STATE="Recovered but unstable"
              elif [ "$LATENCY" -gt 1000 ]; then
                RECOVERY_STATE="Recovered degraded"
              fi

            fi

          fi

          # ==================================
          # Time formatting
          # ==================================

          LOCAL_TIME=$(TZ="$SUMMARY_TIMEZONE" \
            date +"%d %b %Y | %I:%M %p %Z")

          UTC_TIME=$(TZ="UTC" \
            date +"%H:%M UTC")

          # ==================================
          # DOWN MESSAGE
          # ==================================

          if [ "$ACTION" = "opened" ]; then

            MSG="$SEVERITY\n\n"

            MSG+="🌐 Site: $SITE\n"
            MSG+="📡 Status: DOWN\n"
            MSG+="📈 Uptime: $UPTIME\n"

            if [[ "$LATENCY" =~ ^[0-9]+$ ]]; then
              MSG+="$SPEED Last latency: $LATENCY ms\n"
            fi

            MSG+="📊 Health: $JITTER\n"

            if [ "$FLAPS" -ge 3 ]; then
              MSG+="⚠ Flapping detected\n"
            fi

            MSG+="📉 Incident Count: $INCIDENTS\n"
            MSG+="📘 MTTR: ${MTTR_MIN} mins\n"
            MSG+="#Incident-$NUMBER\n\n"

            MSG+="🔗 Incident: $INCIDENT_URL\n"
            MSG+="🔗 Status: $STATUS_URL\n\n"

          else

            MSG="$SEVERITY\n\n"

            MSG+="🌐 Site: $SITE\n"
            MSG+="📡 Status: HEALTHY\n"
            MSG+="📈 Uptime: $UPTIME\n"

            if [[ "$LATENCY" =~ ^[0-9]+$ ]]; then
              MSG+="$SPEED Current latency: $LATENCY ms\n"
            fi

            MSG+="📊 Recovery: $RECOVERY_STATE\n"
            MSG+="📊 Health: $JITTER\n"
            MSG+="⏱ Downtime: $DURATION\n"
            MSG+="📉 Incident Count: $INCIDENTS\n"
            MSG+="📘 MTTR: ${MTTR_MIN} mins\n"
            MSG+="#Incident-$NUMBER\n\n"

            MSG+="🔗 Incident: $INCIDENT_URL\n"
            MSG+="🔗 Status: $STATUS_URL\n\n"

          fi

          MSG+="🕒 $LOCAL_TIME | "
          MSG+="🌍 $UTC_TIME"

          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo -e "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ====================================
      # Send Telegram alert
      # ====================================

      - name: Send Telegram

        run: |

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.build.outputs.msg }}" \
            --argjson thread_id ${{ secrets.ALERTS_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # ====================================
      # Persist metrics safely
      # ====================================

      - name: Commit metrics safely

        run: |

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add observability/incident-metrics.json

          git diff --cached --quiet && exit 0

          git commit -m "Update incident observability metrics"

          for i in 1 2 3; do

            echo "Attempt $i"

            git pull --rebase origin master || true

            if git push origin master; then

              echo "Push successful"
              exit 0

            fi

            echo "Retrying push..."
            sleep 3

          done

          echo "Push failed after retries"
          exit 1

  # ========================================
  # WEEKLY INCIDENT ANALYTICS REPORT
  # ========================================

  weekly-report:

    if: github.event_name == 'schedule'

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # ====================================
      # Build weekly report
      # ====================================

      - name: Build report
        id: report

        env:
          SUMMARY_TIMEZONE: ${{ secrets.SUMMARY_TIMEZONE }}

        run: |

          DB="history/incident-metrics.json"

          REPORT="📊 Weekly Incident Analytics\n\n"

          TOP=$(jq -r '
            to_entries
            | sort_by(-(.value.weekly // 0))
            | .[:5]
            | .[]
            | "\(.key)|\(.value.weekly // 0)|\(.value.mttr // 0)|\(.value.flaps // 0)"
          ' "$DB")

          INDEX=1

          while IFS="|" read -r SITE WEEKLY MTTR FLAPS; do

            [ -z "$SITE" ] && continue

            REPORT+="$INDEX. 🌐 $SITE\n"
            REPORT+="   📉 Weekly Incidents: $WEEKLY\n"
            REPORT+="   📘 MTTR: $((MTTR / 60)) mins\n"
            REPORT+="   ⚠ Flaps: $FLAPS\n\n"

            INDEX=$((INDEX+1))

          done <<< "$TOP"

          REPORT+="━━━━━━━━━━━━━━━━━━\n\n"

          REPORT+="📊 Observability Notes\n"
          REPORT+="• High MTTR = slower recovery\n"
          REPORT+="• High flaps = unstable service\n"
          REPORT+="• Frequent incidents = infra bottleneck\n\n"

          LOCAL_TIME=$(TZ="$SUMMARY_TIMEZONE" \
            date +"%d %b %Y | %I:%M %p %Z")

          REPORT+="🕒 $LOCAL_TIME"

          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ====================================
      # Send weekly report
      # ====================================

      - name: Send Telegram report

        run: |

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.report.outputs.msg }}" \
            --argjson thread_id ${{ secrets.ALERTS_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # ====================================
      # Reset weekly metrics
      # ====================================

      - name: Reset weekly counters

        run: |

          DB="observability/incident-metrics.json"

          jq '
            with_entries(
              .value.weekly = 0
            )
          ' "$DB" > tmp.json && mv tmp.json "$DB"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add observability/incident-metrics.json

          git diff --cached --quiet && exit 0

          git commit -m "Reset weekly incident metrics"

          git pull --rebase origin master || true
          git push origin master  
