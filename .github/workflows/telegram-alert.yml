name: Telegram Alerts (Upptime)

on:
  issues:
    types: [opened, closed]

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
      - name: Filter Upptime issues only
        id: filter
        run: |
          TITLE="${{ github.event.issue.title }}"

          if [[ "$TITLE" == *"is down"* ]] || [[ "$TITLE" == *"is up"* ]]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if not relevant
        if: steps.filter.outputs.valid != 'true'
        run: exit 0

      - name: Build alert message
        id: build
        run: |
          TITLE="${{ github.event.issue.title }}"
          URL="${{ github.event.issue.html_url }}"
          ACTION="${{ github.event.action }}"

          # ===== STATUS DETECTION =====
          if [[ "$TITLE" == *"is down"* ]]; then
            STATUS="DOWN"
            ICON="🛑"
            ALERT="🚨 INCIDENT"
          elif [[ "$TITLE" == *"is up"* ]]; then
            STATUS="RECOVERED"
            ICON="🟢"
            ALERT="✅ RESOLVED"
          else
            STATUS="UPDATE"
            ICON="ℹ️"
            ALERT="ℹ️ UPDATE"
          fi

          # Extract clean site name
          SITE=$(echo "$TITLE" | sed 's/ is down.*//; s/ is up.*//')

          MESSAGE="$ICON $ALERT\n\n"
          MESSAGE+="🌐 Site: $SITE\n"
          MESSAGE+="📡 Status: $STATUS\n"
          MESSAGE+="🔗 Details: $URL\n\n"
          MESSAGE+="🕒 $(TZ='Asia/Kolkata' date +"%d %b %Y | %I:%M %p IST")"

          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo -e "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Telegram alert
        run: |
          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.build.outputs.msg }}" \
            --argjson thread_id ${{ secrets.ALERT_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
