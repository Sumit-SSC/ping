# ==========================================
# ADVANCED INCIDENT ALERT SYSTEM
# ==========================================
#
# Purpose:
#
# Sends Telegram alerts for:
# ✅ Service outages
# ✅ Service recovery
# ✅ Incident metrics
#
# Built around Upptime issue lifecycle.
#
# ==========================================
# ARCHITECTURE
# ==========================================
#
# Architecture:
#
# Upptime handles:
# - site checks
# - issue creation
# - issue closure
# - uptime tracking
# - history generation
#
# This workflow handles:
# - Telegram notifications
# - incident analytics
# - recovery summaries
# - degradation analysis
# - persistent metrics
# - GitHub enrichment
# - RCA automation
# - MTTR persistence
#
# ==========================================
# REQUIRED GITHUB SECRETS
# ==========================================
#
# GH_PAT
# Personal Access Token with:
# - repo
# - workflow
# - issues
#
# STATUS_BASE_URL
#   Base URL for history pages.
#   Example:
#   https://status.example.com/history
#
# CHAT_ID
#   Telegram group/chat ID.
#   Example:
#   -1001234567890
#
# TOPIC_ID
#   Telegram forum topic/thread ID.
#   Example:
#   12
#
# SUMMARY_BOT_TOKEN
#   Telegram bot token.
#   Example:
#   123456789:AAExampleBotTokenHere
#
# SUMMARY_TIMEZONE
#   Display timezone for messages.
#   Examples:
#   Asia/Kolkata
#   Asia/Tokyo
#   UTC
#
# ==========================================
# STATE FILES
# ==========================================
#
# observability/incident-metrics.json
#
# Stores:
# - incident counts
# - total downtime
# - MTTR values
# - historical metrics
# - weekly metrics
# - flap counters
# - active state
#
# ==========================================
# FEATURES
# ==========================================
#
# ✅ Incident open alerts
# ✅ Recovery alerts
# ✅ Downtime duration tracking
# ✅ MTTR tracking
# ✅ Incident frequency tracking
# ✅ Severity classification
# ✅ Speed ladder integration
# ✅ Jitter / degradation indicators
# ✅ Telegram integration
# ✅ Persistent metrics storage
# ✅ GitHub issue enrichment
# ✅ Automated RCA comments
# ✅ Recovery intelligence
#
# ==========================================
# # Actual Working Code ⬇️ / WORKFLOW
# ==========================================

name: 🚨 Incident Observability

concurrency:
  group: observability-${{ github.workflow }}
  cancel-in-progress: true

# ==========================================
# TRIGGERS
# ==========================================

on:

  # ========================================
  # Upptime issue lifecycle
  # ========================================

  issues:
    types:
      - opened
      - closed

  # ========================================
  # Weekly analytics report
  # Monday 03:00 UTC
  # ========================================

  schedule:
    - cron: "0 3 * * 1"

  # ========================================
  # Manual testing
  # ========================================

  workflow_dispatch:

# ==========================================
# REQUIRED PERMISSIONS
# ==========================================

permissions:
  issues: write
  contents: write

# ==========================================
# Prevent overlapping runs (commented as added on top)
# ==========================================

# concurrency:
#   group: incident-observability
#   cancel-in-progress: false

# ==========================================
# JOBS
# ==========================================

jobs:

  # ========================================
  # INCIDENT LIFECYCLE
  # ========================================

  incident:
  
    # if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    timeout-minutes: 15

    # ======================================
    # Ignore unrelated issues
    # ======================================

    if: |
      github.event_name == 'issues' &&
      (
        contains(github.event.issue.title, 'down') ||
        contains(github.event.issue.title, 'up')
      )

    # ======================================
    # Shared environment variables
    # ======================================

    env:

      # ====================================
      # GitHub PAT
      # ====================================

      GH_TOKEN: ${{ secrets.GH_PAT }}

      # ====================================
      # Telegram
      # ====================================

      TG_TOKEN: ${{ secrets.SUMMARY_BOT_TOKEN }}

      CHAT_ID: ${{ secrets.CHAT_ID }}

      THREAD_ID: ${{ secrets.ALERTS_TOPIC_ID }}

      # ====================================
      # URLs
      # ====================================

      INCIDENT_BASE_URL: ${{ secrets.INCIDENT_BASE_URL }}

      STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}

      # ====================================
      # Timezone
      # ====================================

      SUMMARY_TIMEZONE: ${{ secrets.SUMMARY_TIMEZONE }}

      # ====================================
      # GitHub issue metadata
      # ====================================

      ISSUE_TITLE: ${{ github.event.issue.title }}

      ISSUE_NUMBER: ${{ github.event.issue.number }}

      ISSUE_ACTION: ${{ github.event.action }}

      ISSUE_CREATED_AT: ${{ github.event.issue.created_at }}

      ISSUE_CLOSED_AT: ${{ github.event.issue.closed_at }}

      # ====================================
      # GitHub repo metadata
      # ====================================

      GITHUB_REPOSITORY: ${{ github.repository }}

      GITHUB_SERVER_URL: ${{ github.server_url }}

    steps:

      # ====================================
      # Checkout repository
      # ====================================

      - name: Checkout repository
        uses: actions/checkout@v4

      # ====================================
      # Install yq YAML parser
      # ====================================

      - name: Install yq
        shell: bash
        run: |

          sudo wget -qO /usr/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64

          sudo chmod +x /usr/bin/yq

          echo "Installed yq version:"
          yq --version

      # ====================================
      # Validate GitHub authentication
      # ====================================

      - name: Validate GitHub authentication
        shell: bash
        run: |

          echo "================================="
          echo "GitHub Authentication"
          echo "================================="

          gh auth status || true

      # ====================================
      # Initialize observability DB
      # ====================================

      - name: Initialize observability DB
        shell: bash
        run: |

          mkdir -p observability

          DB="observability/incident-metrics.json"

          if [ ! -f "$DB" ]; then

            echo "{}" > "$DB"

            echo "Created observability DB"

          else

            echo "Observability DB already exists"

          fi

      # ====================================
      # Make scripts executable
      # ====================================

      - name: Make scripts executable
        shell: bash
        run: |

          chmod +x .github/scripts/*.sh

      # ====================================
      # Debug workflow context
      # ====================================

      - name: Debug incident context
        shell: bash
        run: |

          echo "================================="
          echo "Incident Context"
          echo "================================="

          echo "Title: $ISSUE_TITLE"
          echo "Action: $ISSUE_ACTION"
          echo "Issue #: $ISSUE_NUMBER"

      # ====================================
      # Incident OPEN handling
      # ====================================

      - name: Run outage intelligence
        if: env.ISSUE_ACTION == 'opened'
        shell: bash
        run: |

          echo "================================="
          echo "🚨 INCIDENT OPEN DETECTED"
          echo "================================="

          bash .github/scripts/incident-open.sh

      # ====================================
      # Incident CLOSE handling
      # ====================================

      - name: Run recovery intelligence
        if: env.ISSUE_ACTION == 'closed'
        shell: bash
        run: |

          echo "================================="
          echo "🟢 INCIDENT RECOVERY DETECTED"
          echo "================================="

          bash .github/scripts/incident-close.sh

      # ====================================
      # Persist observability metrics
      # ====================================

      - name: Persist observability metrics
        shell: bash
        run: |

          echo "================================="
          echo "📊 Persisting observability state"
          echo "================================="

          git config --global user.name \
            "github-actions[bot]"

          git config --global user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add observability/

          # ==================================
          # Commit only if changes exist
          # ==================================

          if git diff --cached --quiet; then

            echo "No observability changes detected"

            exit 0

          fi

          git commit -m \
            "📊 Update observability metrics [skip ci]"

          # ==================================
          # Retry-safe push
          # ==================================

          for i in 1 2 3; do

            echo "Push attempt $i"

            git pull --rebase origin master || true

            if git push origin master; then

              echo "Push successful"

              exit 0

            fi

            echo "Retrying push..."

            sleep 5

          done

          echo "Push failed after retries"

          exit 1

      # ====================================
      # Workflow completion
      # ====================================

      - name: Final workflow status
        shell: bash
        run: |

          echo "================================="
          echo "✅ Incident workflow completed"
          echo "================================="

  # ========================================
  # WEEKLY ANALYTICS REPORT
  # ========================================

  weekly-report:

    if: github.event.name == 'schedule'

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:

      # ====================================
      # Checkout repository
      # ====================================

      - name: Checkout repository
        uses: actions/checkout@v4

      # ====================================
      # Make scripts executable
      # ====================================

      - name: Make scripts executable
        shell: bash
        run: |

          chmod +x .github/scripts/*.sh

      # ====================================
      # Run weekly report
      # ====================================

      - name: Run weekly observability report
        shell: bash
        env:

          TG_TOKEN: ${{ secrets.SUMMARY_BOT_TOKEN }}

          CHAT_ID: ${{ secrets.CHAT_ID }}

          THREAD_ID: ${{ secrets.ALERTS_TOPIC_ID }}

          SUMMARY_TIMEZONE: ${{ secrets.SUMMARY_TIMEZONE }}

        run: |

          bash .github/scripts/weekly-report.sh
