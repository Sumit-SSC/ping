# ==========================================
# INFRASTRUCTURE HEALTH DIGEST
# ==========================================
#
# Purpose:
#
# Sends a visual infrastructure summary
# to Telegram using Upptime-generated
# uptime + latency history.
#
# ==========================================
# FEATURES
# ==========================================
#
# ✅ Daily Telegram summary
# ✅ GitHub cron reliability workaround
# ✅ Internal timezone-aware scheduling
# ✅ Duplicate prevention
# ✅ Health bars
# ✅ Uptime monitoring summary
# ✅ Sequential service numbering
# ✅ Adaptive latency speed ladder
# ✅ Availability grading
# ✅ Infrastructure trend analysis
# ✅ Slowest service detection
# ✅ Instability tracking
# ✅ Health bars
# ✅ UTC + local timezone display
# ✅ Runtime telemetry
#
# ==========================================
# REQUIRED GITHUB SECRETS
# ==========================================
#
# DASHBOARD_URL
#   Main uptime dashboard URL.
#   Example:
#   https://status.example.com
#
# STATUS_BASE_URL
#   Base URL for history/status pages.
#   Example:
#   https://status.example.com/history
#
# CHAT_ID
#   Telegram group/chat ID.
#   Example:
#   -1001234567890
#
# TOPIC_ID
#   Telegram forum topic/thread ID.
#   Example:
#   12
#
# SUMMARY_BOT_TOKEN
#   Telegram bot token.
#   Example:
#   123456789:AAExampleBotTokenHere
#
# SUMMARY_TIMEZONE
#   Display timezone for messages.
#   Examples:
#   Asia/Kolkata
#   Asia/Tokyo
#   UTC
#
# ==========================================
# CRON NOTES
# ==========================================
#
# GitHub Actions cron uses UTC ONLY.
#
# IST = UTC + 5:30
#
# Examples:
#
# 02:30 UTC = 08:00 AM IST
# 03:00 UTC = 08:30 AM IST
#
# Cron helper:
# https://crontab.guru/
#
# Timezone converter:
# https://www.worldtimebuddy.com/
#
# IMPORTANT:
# GitHub scheduled workflows may delay
# by several minutes during high load.
#
#
# WHY RUN EVERY 30 MINUTES?
# ==========================================
#
# GitHub cron jobs are unreliable for:
#   once-daily schedules
#
# So instead:
#   workflow runs every 30 mins
#
# Then internally checks:
#   current local hour
#
# This dramatically improves reliability.
#
# ------------------------------------------
# TEST MODE (CURRENT)
# ------------------------------------------
#
# Every 5 minutes:
#
# */5 * * * *
#
# Useful because GitHub scheduled workflows
# may delay by several minutes.
#
# ------------------------------------------
# PRODUCTION MODE
# ------------------------------------------
#
# Daily 8:05 AM IST:
# IST = UTC +5:30
# 08:05 IST = 02:35 UTC
#
# Production cron:
#
# 35 2 * * *
#
# Replace the test cron with above after
# verifying scheduled workflows work.
#
# Cron helper:
# https://crontab.guru/

# ==========================================
# Actual Working Code ⬇️
# ==========================================

name: Advanced Infrastructure Health Digest

on:

 # ========================================
  # Run every 30 minutes
  # ========================================
  schedule:
    - cron: "*/30 * * * *"

  # ========================================
  # Manual trigger
  # =================================

  workflow_dispatch:

jobs:

  summary:

    runs-on: ubuntu-latest

    env:
      DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
      STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}
      SUMMARY_TIMEZONE: ${{ secrets.SUMMARY_TIMEZONE }}

    steps:

      # ====================================
      # Runtime timer
      # ====================================

      - name: Start timer
        run: echo "START=$(date +%s)" >> $GITHUB_ENV

      # ====================================
      # Checkout repository
      # ====================================

      - name: Checkout repository
        uses: actions/checkout@v4

      # ====================================
      # Initialize cache
      # ====================================
      - name: Initialize cache
        run: |
          mkdir -p observability

      # ====================================
      # Time gate
      #
      # Prevents GitHub cron misses
      # ====================================
      - name: Time gate
        run: |

          # ==================================
          # Desired LOCAL hour
          #
          # Example:
          # 08 = 8 AM
          # 20 = 8 PM
          # ==================================

          TARGET_HOUR="07"

          CURRENT_HOUR=$(TZ="$SUMMARY_TIMEZONE" date +%H)

          echo "Current hour: $CURRENT_HOUR"
          echo "Target hour: $TARGET_HOUR"

          if [ "$CURRENT_HOUR" != "$TARGET_HOUR" ]; then
            echo "Outside summary window."
            exit 0
          fi

      # ====================================
      # Prevent duplicate sends
      # ====================================
      - name: Prevent duplicate sends
        run: |

          LAST_RUN_FILE="observability/summary-last-run.json"

          CURRENT_SLOT=$(TZ="$SUMMARY_TIMEZONE" date +%Y-%m-%d-%H)

          if [ -f "$LAST_RUN_FILE" ]; then

            LAST=$(cat "$LAST_RUN_FILE")

            if [ "$LAST" = "$CURRENT_SLOT" ]; then
              echo "Summary already sent."
              exit 0
            fi
          fi

          echo "$CURRENT_SLOT" > "$LAST_RUN_FILE"

      # ====================================
      # Start runtime timer
      # ====================================
      - name: Start timer
        run: |
          echo "START=$(date +%s)" >> $GITHUB_ENV


      # ====================================
      # Build infrastructure summary
      # ====================================

      - name: Build summary
        id: build

        run: |

          SUMMARY="📊 Infrastructure Health Digest\n\n"
          SUMMARY+="🔗 Dashboard: $DASHBOARD_URL\n\n"

          FILE="history/summary.json"

          TOTAL=0
          DOWN=0

          LAT_SUM=0
          LAT_COUNT=0

          SLOWEST_SITE=""
          SLOWEST_LAT=0

          MOST_UNSTABLE=""
          MOST_SPIKES=0

          TMP_DOWN=$(mktemp)
          TMP_UP=$(mktemp)

          COUNT=$(jq length "$FILE")

          # ==================================
          # Iterate monitored services
          # ==================================

          for i in $(seq 0 $(($COUNT - 1))); do

            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            UPTIME=$(jq -r ".[$i].uptime" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            TOTAL=$((TOTAL + 1))

            # ==================================
            # Service state
            # ==================================

            if [ "$STATUS" = "up" ]; then
              ICON="🟢"
            else
              ICON="🔴"
              DOWN=$((DOWN + 1))
            fi

            # ==================================
            # Read latest latency
            # ==================================

            YML_FILE="history/$SLUG.yml"

            LATENCY=""

            if [ -f "$YML_FILE" ]; then
              LATENCY=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')
            fi

            # ==================================
            # Slowest service tracking
            # ==================================

            if [[ "$LATENCY" =~ ^[0-9]+$ ]]; then

              if [ "$LATENCY" -gt "$SLOWEST_LAT" ]; then
                SLOWEST_LAT="$LATENCY"
                SLOWEST_SITE="$NAME"
              fi

            fi

            # ==================================
            # Instability tracking
            # ==================================
            # Reads observability telemetry from:
            # observability/latency-state.json
            #
            # This file stores:
            # - spike counters
            # - degraded services
            # - instability analytics
            #

            if [ -f "observability/latency-state.json" ]; then

              SPIKES=$(jq -r \
                --arg slug "$SLUG" \
                '.[$slug].weekly_spikes // 0' \
                observability/latency-state.json)

              if [ "$SPIKES" -gt "$MOST_SPIKES" ]; then
                MOST_SPIKES="$SPIKES"
                MOST_UNSTABLE="$NAME"
              fi

            fi

            # ==================================
            # Latency speed ladder
            # ==================================

            if [ "$STATUS" = "down" ]; then

              LAT_LABEL="🛑 DOWN"

            elif [ -n "$LATENCY" ]; then

              LAT_SUM=$((LAT_SUM + LATENCY))
              LAT_COUNT=$((LAT_COUNT + 1))

              if [ "$LATENCY" -lt 100 ]; then
                EMOJI="⚡"
              elif [ "$LATENCY" -lt 250 ]; then
                EMOJI="🚀"
              elif [ "$LATENCY" -lt 500 ]; then
                EMOJI="✈️"
              elif [ "$LATENCY" -lt 750 ]; then
                EMOJI="🏎️"
              elif [ "$LATENCY" -lt 1000 ]; then
                EMOJI="🚗"
              elif [ "$LATENCY" -lt 1500 ]; then
                EMOJI="🏇"
              elif [ "$LATENCY" -lt 2000 ]; then
                EMOJI="🐢"
              else
                EMOJI="🐌"
              fi

              LAT_LABEL="$EMOJI $LATENCY ms"

            else

              LAT_LABEL="—"

            fi

            # ==================================
            # Health bar
            # ==================================

            UP_NUM=$(echo "$UPTIME" | grep -o '[0-9]*' | head -1)
            UP_NUM=${UP_NUM:-0}

            FILLED=$((UP_NUM / 20))
            EMPTY=$((5 - FILLED))

            if [ "$STATUS" = "down" ]; then

              HBAR="🟥🟥🟥🟥🟥"

            else

              if [ "$UP_NUM" -ge 100 ]; then
                COLOR="🟩"
              elif [ "$UP_NUM" -ge 80 ]; then
                COLOR="🟦"
              elif [ "$UP_NUM" -ge 60 ]; then
                COLOR="🟨"
              elif [ "$UP_NUM" -ge 40 ]; then
                COLOR="🟧"
              else
                COLOR="🟥"
              fi

              HBAR=""

              for j in $(seq 1 $FILLED); do
                HBAR+="$COLOR"
              done

              for j in $(seq 1 $EMPTY); do
                HBAR+="⬜"
              done

            fi

            STATUS_URL="$STATUS_BASE_URL/$SLUG"

            BLOCK="$ICON|$NAME|$LAT_LABEL|$HBAR|$UPTIME|$STATUS_URL"

            # ==================================
            # DOWN services shown first
            # ==================================

            if [ "$STATUS" = "down" ]; then
              echo "$BLOCK" >> "$TMP_DOWN"
            else
              echo "$BLOCK" >> "$TMP_UP"
            fi

          done

          # ==================================
          # Render DOWN services first
          # Sequential numbering
          # ==================================

          INDEX=1

          while IFS="|" read -r ICON NAME LAT HBAR UPTIME URL; do

            [ -z "$NAME" ] && continue

            SUMMARY+="$INDEX. $ICON $NAME\n"
            SUMMARY+="   $LAT | 📈 $HBAR | ⏱ $UPTIME\n"
            SUMMARY+="   🔗 $URL\n\n"

            INDEX=$((INDEX + 1))

          done < "$TMP_DOWN"

          while IFS="|" read -r ICON NAME LAT HBAR UPTIME URL; do

            [ -z "$NAME" ] && continue

            SUMMARY+="$INDEX. $ICON $NAME\n"
            SUMMARY+="   $LAT | 📈 $HBAR | ⏱ $UPTIME\n"
            SUMMARY+="   🔗 $URL\n\n"

            INDEX=$((INDEX + 1))

          done < "$TMP_UP"

          # ==================================
          # Infrastructure metrics
          # ==================================

          UP=$((TOTAL - DOWN))

          if [ "$TOTAL" -gt 0 ]; then
            HEALTH=$((UP * 100 / TOTAL))
          else
            HEALTH=0
          fi

          if [ "$LAT_COUNT" -gt 0 ]; then
            AVG_LAT=$((LAT_SUM / LAT_COUNT))
          else
            AVG_LAT=0
          fi

          # ==================================
          # Availability grade
          # ==================================

          if [ "$HEALTH" -ge 100 ]; then
            GRADE="A+"
          elif [ "$HEALTH" -ge 90 ]; then
            GRADE="A"
          elif [ "$HEALTH" -ge 80 ]; then
            GRADE="B"
          elif [ "$HEALTH" -ge 70 ]; then
            GRADE="C"
          elif [ "$HEALTH" -ge 50 ]; then
            GRADE="D"
          else
            GRADE="F"
          fi

          # ==================================
          # Health bar
          # ==================================

          FILLED=$((HEALTH / 20))
          EMPTY=$((5 - FILLED))

          if [ "$HEALTH" -ge 100 ]; then
            COLOR="🟩"
          elif [ "$HEALTH" -ge 80 ]; then
            COLOR="🟦"
          elif [ "$HEALTH" -ge 60 ]; then
            COLOR="🟨"
          elif [ "$HEALTH" -ge 40 ]; then
            COLOR="🟧"
          else
            COLOR="🟥"
          fi

          BAR=""

          for i in $(seq 1 $FILLED); do
            BAR+="$COLOR"
          done

          for i in $(seq 1 $EMPTY); do
            BAR+="⬜"
          done

          # ==================================
          # Network quality
          # ==================================

          if [ "$AVG_LAT" -lt 200 ]; then
            NET_STATE="Excellent"
            NET_ICON="⚡"
          elif [ "$AVG_LAT" -lt 500 ]; then
            NET_STATE="Healthy"
            NET_ICON="🚀"
          elif [ "$AVG_LAT" -lt 1000 ]; then
            NET_STATE="Moderate"
            NET_ICON="✈️"
          elif [ "$AVG_LAT" -lt 1500 ]; then
            NET_STATE="Degraded"
            NET_ICON="🏇"
          else
            NET_STATE="Critical"
            NET_ICON="🐌"
          fi

          # ==================================
          # Infrastructure trend analysis
          # ==================================

          TREND="Stable"

          if [ "$DOWN" -ge 3 ]; then
            TREND="Critical"
          elif [ "$DOWN" -ge 1 ]; then
            TREND="Degrading"
          elif [ "$AVG_LAT" -gt 1000 ]; then
            TREND="Degrading"
          elif [ "$AVG_LAT" -gt 500 ]; then
            TREND="Moderate"
          fi

          # ==================================
          # Time formatting
          # ==================================

          LOCAL_TIME=$(TZ="$SUMMARY_TIMEZONE" \
            date +"%d %b %Y | %I:%M %p %Z")

          UTC_TIME=$(TZ="UTC" \
            date +"%H:%M UTC")

          # ==================================
          # Final infrastructure summary
          # ==================================

          SUMMARY+="━━━━━━━━━━━━━━━━━━\n\n"

          SUMMARY+="🏥 Infrastructure Health\n"
          SUMMARY+="📈 Availability: $BAR $HEALTH%\n"
          SUMMARY+="🎓 Availability Grade: $GRADE\n"
          SUMMARY+="$NET_ICON Network Quality: $NET_STATE ($AVG_LAT ms)\n"
          SUMMARY+="📊 Infrastructure Trend: $TREND\n"
          SUMMARY+="🔴 Active Incidents: $DOWN / $TOTAL\n"

          # ==================================
          # Slowest service
          # ==================================

          if [ -n "$SLOWEST_SITE" ]; then

            SUMMARY+="\n🐌 Slowest Service\n"
            SUMMARY+="• $SLOWEST_SITE ($SLOWEST_LAT ms)\n"

          fi

          # ==================================
          # Instability insights
          # ==================================

          if [ "$MOST_SPIKES" -gt 0 ]; then

            SUMMARY+="\n🚨 Most Unstable\n"
            SUMMARY+="• $MOST_UNSTABLE ($MOST_SPIKES spikes)\n"

          fi

          # ==================================
          # Operational insights
          # ==================================

          SUMMARY+="\n📡 System Assessment\n"

          if [ "$TREND" = "Critical" ]; then
            SUMMARY+="• Critical infrastructure degradation detected\n"
          elif [ "$TREND" = "Degrading" ]; then
            SUMMARY+="• Elevated latency and service instability\n"
          elif [ "$TREND" = "Moderate" ]; then
            SUMMARY+="• Infrastructure operating under moderate load\n"
          else
            SUMMARY+="• Infrastructure operating normally\n"
          fi

          SUMMARY+="• Monitoring systems operational\n"

          # ==================================
          # Time + runtime
          # ==================================

          SUMMARY+="\n🕒 $LOCAL_TIME | "
          SUMMARY+="🌍 $UTC_TIME | "
          SUMMARY+="📝⏱: $(( $(date +%s) - $START ))s"

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ====================================
      # Send Telegram summary
      # ====================================

      - name: Send Telegram summary

        run: |

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.build.outputs.message }}" \
            --argjson thread_id ${{ secrets.TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
