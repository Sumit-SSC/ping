name: Telegram Uptime Summary

on:
  schedule:
    - cron: "30 2 * * *"
  push:
    paths:
      - "history/*"
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest

    env:
      DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
      STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}

    steps:
      - name: Start timer
        run: echo "START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build summary
        id: build
        run: |
          SUMMARY="📊 Uptime Summary\n"
          SUMMARY+="🔗 Dashboard: $DASHBOARD_URL\n\n"

          FILE="history/summary.json"

          TOTAL=0
          DOWN=0
          INDEX=1

          DOWN_BLOCK=""
          UP_BLOCK=""

          COUNT=$(jq length "$FILE")

          # ===== Collect latencies =====
          LAT_ARRAY=()

          for i in $(seq 0 $(($COUNT - 1))); do
            SLUG=$(jq -r ".[$i].slug" "$FILE")
            YML_FILE="history/$SLUG.yml"

            if [ -f "$YML_FILE" ]; then
              LAT=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')
              [[ -n "$LAT" ]] && LAT_ARRAY+=("$LAT")
            fi
          done

          MIN_LAT=999999
          MAX_LAT=0

          for L in "${LAT_ARRAY[@]}"; do
            (( L < MIN_LAT )) && MIN_LAT=$L
            (( L > MAX_LAT )) && MAX_LAT=$L
          done

          RANGE=$((MAX_LAT - MIN_LAT))
          [ "$RANGE" -eq 0 ] && RANGE=1

          EMOJIS=(⚡ 🚀 ✈️ 🏎️ 🚄 🚗 🏇 🚲 🏃 🐢 🐌)

          LAT_SUM=0
          LAT_COUNT=0

          # ===== Build blocks =====
          for i in $(seq 0 $(($COUNT - 1))); do
            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            UPTIME=$(jq -r ".[$i].uptime" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            TOTAL=$((TOTAL+1))

            if [ "$STATUS" = "up" ]; then
              ICON="🟢"
            else
              ICON="🔴"
              DOWN=$((DOWN+1))
            fi

            # latency
            YML_FILE="history/$SLUG.yml"
            LATENCY=""

            if [ -f "$YML_FILE" ]; then
              LATENCY=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')
            fi

            if [ "$STATUS" = "down" ]; then
              LAT_LABEL="🛑 🚨 DOWN"
            elif [ -n "$LATENCY" ]; then
              LAT_SUM=$((LAT_SUM + LATENCY))
              LAT_COUNT=$((LAT_COUNT + 1))

              POS=$(( (LATENCY - MIN_LAT) * 10 / RANGE ))
              EMOJI=${EMOJIS[$POS]}

              LAT_LABEL="$EMOJI $LATENCY ms"
            else
              LAT_LABEL="—"
            fi

            # ===== Health bar =====
            UP_NUM=$(echo "$UPTIME" | grep -o '[0-9]*' | head -1)
            UP_NUM=${UP_NUM:-0}

            FILLED=$((UP_NUM / 20))
            EMPTY=$((5 - FILLED))

            if [ "$STATUS" = "down" ]; then
              HBAR="🟥🟥🟥🟥🟥"
            else
              if [ "$UP_NUM" -ge 100 ]; then COLOR="🟩"
              elif [ "$UP_NUM" -ge 80 ]; then COLOR="🟦"
              elif [ "$UP_NUM" -ge 60 ]; then COLOR="🟨"
              elif [ "$UP_NUM" -ge 40 ]; then COLOR="🟧"
              else COLOR="🟥"
              fi

              HBAR=""
              for j in $(seq 1 $FILLED); do HBAR+="$COLOR"; done
              for j in $(seq 1 $EMPTY); do HBAR+="⬜"; done
            fi

            STATUS_URL="$STATUS_BASE_URL/$SLUG"

            BLOCK="$INDEX. $ICON $NAME\n"
            BLOCK+="   $LAT_LABEL | 📈 $HBAR | ⏱ $UPTIME\n"
            BLOCK+="   🔗 $STATUS_URL\n\n"

            if [ "$STATUS" = "down" ]; then
              DOWN_BLOCK+="$BLOCK"
            else
              UP_BLOCK+="$BLOCK"
            fi

            INDEX=$((INDEX+1))
          done

          # combine DOWN first
          SUMMARY+="$DOWN_BLOCK$UP_BLOCK"

          # ===== Overall metrics =====
          UP=$((TOTAL - DOWN))
          HEALTH=$(( TOTAL > 0 ? UP * 100 / TOTAL : 0 ))
          AVG_LAT=$(( LAT_COUNT > 0 ? LAT_SUM / LAT_COUNT : 0 ))

          FILLED=$((HEALTH / 20))
          EMPTY=$((5 - FILLED))

          if [ "$HEALTH" -ge 100 ]; then COLOR="🟩"
          elif [ "$HEALTH" -ge 80 ]; then COLOR="🟦"
          elif [ "$HEALTH" -ge 60 ]; then COLOR="🟨"
          elif [ "$HEALTH" -ge 40 ]; then COLOR="🟧"
          else COLOR="🟥"
          fi

          BAR=""
          for i in $(seq 1 $FILLED); do BAR+="$COLOR"; done
          for i in $(seq 1 $EMPTY); do BAR+="⬜"; done

          SUMMARY+="━━━━━━━━━━━━━━━━━━\n\n"
          SUMMARY+="📈 Health: $BAR $HEALTH%\n"
          SUMMARY+="⚡ Avg Latency: $AVG_LAT ms\n"
          SUMMARY+="🔴 Down: $DOWN / $TOTAL\n\n"
          SUMMARY+="🕒 $(TZ='Asia/Kolkata' date +"%d %b %Y | %I:%M %p IST") | ⏱ Runtime: $(( $(date +%s) - $START ))s"

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Telegram message
        run: |
          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.build.outputs.message }}" \
            --argjson thread_id ${{ secrets.TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
