name: Telegram Uptime Summary

on:
  schedule:
    - cron: "30 2 * * *"
  push:
    paths:
      - "history/*"
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest

    env:
      DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
      STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}

    steps:
      - name: Start timer
        run: echo "START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build summary
        id: build
        run: |
          SUMMARY="📊 Uptime Summary\n"
          SUMMARY+="🔗 Dashboard: $DASHBOARD_URL\n\n"

          FILE="history/summary.json"

          TOTAL=0
          DOWN=0
          LAT_SUM=0
          LAT_COUNT=0

          DOWN_BLOCK=""
          UP_BLOCK=""

          COUNT=$(jq length "$FILE")

          for i in $(seq 0 $(($COUNT - 1))); do
            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            UPTIME=$(jq -r ".[$i].uptime" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            TOTAL=$((TOTAL+1))

            if [ "$STATUS" = "up" ]; then
              ICON="🟢"
            else
              ICON="🔴"
              DOWN=$((DOWN+1))
            fi

            # latency
            YML_FILE="history/$SLUG.yml"
            LATENCY=""
            if [ -f "$YML_FILE" ]; then
              LATENCY=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')
            fi

            if [ -n "$LATENCY" ]; then
              LAT_SUM=$((LAT_SUM + LATENCY))
              LAT_COUNT=$((LAT_COUNT + 1))

              if [ "$STATUS" = "down" ]; then
                LAT_LABEL="🚨 DOWN"
              elif [ "$LATENCY" -lt 500 ]; then
                LAT_LABEL="⚡ $LATENCY ms (Fast)"
              elif [ "$LATENCY" -lt 1500 ]; then
                LAT_LABEL="⚠ $LATENCY ms (Moderate)"
              else
                LAT_LABEL="🐢 $LATENCY ms (Slow)"
              fi
            else
              LAT_LABEL="—"
            fi

            # health bar
            UP_NUM=$(echo "$UPTIME" | sed 's/%//g' | cut -d'.' -f1)

            FILLED=$((UP_NUM / 20))
            EMPTY=$((5 - FILLED))

            HBAR=""
            for j in $(seq 1 $FILLED); do HBAR+="🟩"; done
            for j in $(seq 1 $EMPTY); do HBAR+="⬜"; done

            STATUS_URL="$STATUS_BASE_URL/$SLUG"

            BLOCK="$ICON $NAME\n"
            BLOCK+="   $LAT_LABEL | 📈 $HBAR | ⏱ $UPTIME\n"
            BLOCK+="   🔗 $STATUS_URL\n\n"

            if [ "$STATUS" = "down" ]; then
              DOWN_BLOCK+="$BLOCK"
            else
              UP_BLOCK+="$BLOCK"
            fi
          done

          # combine DOWN first
          COMBINED="$DOWN_BLOCK$UP_BLOCK"

          # BLOCK-BASED numbering (FIXED)
          INDEX=1
          OUTPUT=""

          IFS=$'\n\n' read -d '' -r -a BLOCKS <<< "$COMBINED"

          for block in "${BLOCKS[@]}"; do
            [[ -z "$block" ]] && continue
            OUTPUT+="$INDEX. $block\n\n"
            INDEX=$((INDEX+1))
          done

          SUMMARY+="$OUTPUT"

          # overall metrics
          UP=$((TOTAL - DOWN))

          if [ "$TOTAL" -gt 0 ]; then
            HEALTH=$((UP * 100 / TOTAL))
          else
            HEALTH=0
          fi

          if [ "$LAT_COUNT" -gt 0 ]; then
            AVG_LAT=$((LAT_SUM / LAT_COUNT))
          else
            AVG_LAT=0
          fi

          FILLED=$((HEALTH / 20))
          EMPTY=$((5 - FILLED))

          BAR=""
          for i in $(seq 1 $FILLED); do BAR+="🟩"; done
          for i in $(seq 1 $EMPTY); do BAR+="⬜"; done

          SUMMARY+="━━━━━━━━━━━━━━━━━━\n\n"
          SUMMARY+="📈 Health: $BAR $HEALTH%\n"
          SUMMARY+="⚡ Avg Latency: $AVG_LAT ms\n"
          SUMMARY+="🔴 Down: $DOWN / $TOTAL\n\n"
          SUMMARY+="🕒 $(TZ='Asia/Kolkata' date +"%d %b %Y | %I:%M %p IST") | ⏱ Runtime: $(( $(date +%s) - $START ))s"

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Telegram message
        run: |
          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.build.outputs.message }}" \
            --argjson thread_id ${{ secrets.TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
