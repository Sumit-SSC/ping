name: Telegram Uptime Summary

on:
  schedule:
    - cron: "30 2 * * *"
  push:
    paths:
      - "history/*"
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest

    steps:
      - name: Start timer
        run: echo "START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build summary
        id: build
        run: |
          REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          SUMMARY="📊 <b>Uptime Summary</b>\n"
          SUMMARY+="🔗 <a href=\"$REPO_URL\">Dashboard</a>\n\n"

          FILE="history/summary.json"
          TOTAL=0
          DOWN=0
          LAT_SUM=0
          LAT_COUNT=0
          INDEX=1

          COUNT=$(jq length "$FILE")

          for i in $(seq 0 $(($COUNT - 1))); do
            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            UPTIME=$(jq -r ".[$i].uptime" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            TOTAL=$((TOTAL+1))

            if [ "$STATUS" = "up" ]; then
              ICON="🟢"
            else
              ICON="🔴"
              DOWN=$((DOWN+1))
            fi

            # Escape HTML-sensitive chars
            SAFE_NAME=$(echo "$NAME" | sed 's/&/&amp;/g; s/</&lt;/g; s/>/&gt;/g')

            # Latency from YAML
            YML_FILE="history/$SLUG.yml"
            LATENCY=""
            if [ -f "$YML_FILE" ]; then
              LATENCY=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')
            fi

            if [ -n "$LATENCY" ]; then
              LAT_SUM=$((LAT_SUM + LATENCY))
              LAT_COUNT=$((LAT_COUNT + 1))

              if [ "$LATENCY" -lt 500 ]; then
                LAT_LABEL="⚡ $LATENCY ms"
              elif [ "$LATENCY" -lt 1500 ]; then
                LAT_LABEL="⚠ $LATENCY ms"
              else
                LAT_LABEL="🐢 $LATENCY ms"
              fi
            else
              LAT_LABEL="—"
            fi

            STATUS_URL="https://status.sumit.indevs.in/history/$SLUG"
            GRAPH_URL="https://github.com/${{ github.repository }}/blob/master/graphs/$SLUG/response-time-week.png"

            SUMMARY+="$INDEX️⃣ $ICON <b>$SAFE_NAME</b>\n"
            SUMMARY+="   $LAT_LABEL | $UPTIME uptime\n"
            SUMMARY+="   🔗 <a href=\"$GRAPH_URL\">Graph</a>\n"
            SUMMARY+="   🔗 <a href=\"$STATUS_URL\">Status</a>\n\n"
            INDEX=$((INDEX+1))
          done

          UP=$((TOTAL - DOWN))

          if [ "$TOTAL" -gt 0 ]; then
            HEALTH=$((UP * 100 / TOTAL))
          else
            HEALTH=0
          fi

          if [ "$LAT_COUNT" -gt 0 ]; then
            AVG_LAT=$((LAT_SUM / LAT_COUNT))
          else
            AVG_LAT=0
          fi

          FILLED=$((HEALTH / 20))
          EMPTY=$((5 - FILLED))

          BAR=""
          for i in $(seq 1 $FILLED); do BAR+="🟩"; done
          for i in $(seq 1 $EMPTY); do BAR+="⬜"; done

          SUMMARY+="━━━━━━━━━━━━━━━━━━\n\n"
          SUMMARY+="📈 <b>Health:</b> $BAR $HEALTH%\n"
          SUMMARY+="⚡ <b>Avg Latency:</b> $AVG_LAT ms\n"
          SUMMARY+="🔴 <b>Down:</b> $DOWN / $TOTAL\n\n"
          SUMMARY+="🕒 $(TZ='Asia/Kolkata' date +"%d %b %Y | %I:%M %p IST")"

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Calculate runtime
        id: runtime
        run: |
          END=$(date +%s)
          echo "value=$((END - $START))s" >> $GITHUB_OUTPUT

      - name: Send Telegram message
        run: |
          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.build.outputs.message }}\n\n⏱ Runtime: ${{ steps.runtime.outputs.value }}" \
            --argjson thread_id ${{ secrets.TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              parse_mode: "HTML",
              disable_web_page_preview: false
            }')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
