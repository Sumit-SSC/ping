# ==========================================
# ADVANCED INCIDENT ALERT SYSTEM
# ==========================================
#
# Purpose:
#
# Sends Telegram alerts for:
# ✅ Service outages
# ✅ Service recovery
# ✅ Incident metrics
# ✅ Weekly incident reports
#
# Built around Upptime issue lifecycle.
#
# Architecture:
#
# Upptime handles:
# - site checks
# - issue creation
# - issue closure
# - uptime tracking
# - history generation
#
# This workflow handles:
# - Telegram notifications
# - MTTR tracking
# - incident analytics
# - recovery summaries
# - reporting
#
# ==========================================
# REQUIRED GITHUB SECRETS
# ==========================================
#
# INCIDENT_BASE_URL
#   Base URL for incident pages.
#   Example:
#   https://status.example.com/incident
#
# STATUS_BASE_URL
#   Base URL for history pages.
#   Example:
#   https://status.example.com/history
#
# CHAT_ID
#   Telegram group/chat ID.
#
# ALERTS_TOPIC_ID
#   Telegram forum topic/thread ID.
#
# SUMMARY_BOT_TOKEN
#   Telegram bot token.
#
# SUMMARY_TIMEZONE
#   Display timezone for messages.
#
# Examples:
#   Asia/Kolkata
#   Asia/Tokyo
#   Europe/Berlin
#   UTC
#
# ==========================================
# CRON NOTES
# ==========================================
#
# GitHub cron uses UTC timezone only.
#
# Current:
# "0 3 * * 1"
# = Every Monday 03:00 UTC
#
# Use:
# https://crontab.guru/
#
# ==========================================
# STATE FILES
# ==========================================
#
# history/incident-metrics.json
#
# Stores:
# - incident counts
# - total downtime
# - MTTR values
# - historical metrics
#
# This file persists across workflow runs.
#
# ==========================================
# FEATURES
# ==========================================
#
# ✅ Incident open alerts
# ✅ Recovery alerts
# ✅ Downtime duration tracking
# ✅ MTTR tracking
# ✅ Incident frequency tracking
# ✅ Weekly reporting
# ✅ Severity classification
# ✅ Speed ladder integration
# ✅ Jitter / degradation indicators
# ✅ Telegram integration
# ✅ Persistent metrics storage
#
# ==========================================

name: Advanced Incident Alerts

on:

  # ========================================
  # Upptime issue lifecycle
  # ========================================
  #
  # opened = outage detected
  # closed = recovery detected
  #
  # Event-driven architecture is preferred
  # over polling because Upptime already
  # handles monitoring internally.
  # ========================================

  issues:
    types:
      - opened
      - closed

  # ========================================
  # Weekly incident analytics report
  # ========================================

  schedule:
    - cron: "0 3 * * 1"

  # ========================================
  # Manual workflow trigger
  # ========================================

  workflow_dispatch:

jobs:

  # ========================================
  # INCIDENT / RECOVERY ALERTS
  # ========================================

  incident-alert:

    if: github.event_name == 'issues'

    runs-on: ubuntu-latest

    steps:

      # ====================================
      # Checkout repository
      # ====================================

      - uses: actions/checkout@v4

      # ====================================
      # Initialize metrics state file
      # ====================================
      #
      # Stores:
      # - incidents count
      # - cumulative downtime
      # - MTTR values
      #
      # Prevents metrics loss between runs.
      # ====================================

      - name: Initialize incident state
        run: |
          mkdir -p history

          if [ ! -f history/incident-metrics.json ]; then
            echo '{}' > history/incident-metrics.json
          fi

      # ====================================
      # Filter only Upptime incidents
      # ====================================
      #
      # Prevents unrelated GitHub issues
      # from triggering Telegram alerts.
      # ====================================

      - name: Filter issues
        id: filter
        run: |

          TITLE="${{ github.event.issue.title }}"

          if [[ "$TITLE" == *"down"* ]] || [[ "$TITLE" == *"up"* ]]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if irrelevant
        if: steps.filter.outputs.valid != 'true'
        run: exit 0

      # ====================================
      # Build incident message
      # ====================================
      #
      # Handles:
      # - incident parsing
      # - latency analysis
      # - MTTR calculations
      # - severity classification
      # - Telegram formatting
      # ====================================

      - name: Build incident message
        id: build

        env:
          INCIDENT_BASE_URL: ${{ secrets.INCIDENT_BASE_URL }}
          STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}
          SUMMARY_TIMEZONE: ${{ secrets.SUMMARY_TIMEZONE }}

        run: |

          TITLE="${{ github.event.issue.title }}"
          ACTION="${{ github.event.action }}"
          NUMBER="${{ github.event.issue.number }}"

          CREATED="${{ github.event.issue.created_at }}"
          CLOSED="${{ github.event.issue.closed_at }}"

          INCIDENT_URL="$INCIDENT_BASE_URL/$NUMBER"

          FILE="history/summary.json"
          METRICS_FILE="history/incident-metrics.json"

          # ==================================
          # Clean site name from issue title
          # ==================================

          SITE=$(echo "$TITLE" \
            | sed -E 's/\[.*\]//g' \
            | sed -E 's/^🟥 //; s/^🟩 //' \
            | sed -E 's/ is down.*//; s/ is up.*//' \
            | xargs)

          # ==================================
          # Match site slug from summary.json
          # ==================================

          SLUG=$(jq -r \
            --arg site "$SITE" \
            '.[] | select(.name == $site) | .slug' \
            "$FILE")

          [ -z "$SLUG" ] && SLUG="unknown"

          STATUS_URL="$STATUS_BASE_URL/$SLUG"

          # ==================================
          # Read latest latency snapshot
          # ==================================

          YML_FILE="history/$SLUG.yml"

          LATENCY="unknown"

          if [ -f "$YML_FILE" ]; then
            LATENCY=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')
          fi

          # ==================================
          # Latency speed ladder
          # ==================================
          #
          # Represents user experience feel.
          #
          # ⚡ Instant
          # 🚀 Fast
          # ✈️ Good
          # 🏎️ Responsive
          # 🚗 Moderate
          # 🏇 Slower
          # 🐢 Very slow
          # 🐌 Critical
          # ==================================

          if [[ "$LATENCY" =~ ^[0-9]+$ ]]; then

            if [ "$LATENCY" -lt 100 ]; then
              SPEED="⚡"
            elif [ "$LATENCY" -lt 250 ]; then
              SPEED="🚀"
            elif [ "$LATENCY" -lt 500 ]; then
              SPEED="✈️"
            elif [ "$LATENCY" -lt 750 ]; then
              SPEED="🏎️"
            elif [ "$LATENCY" -lt 1000 ]; then
              SPEED="🚗"
            elif [ "$LATENCY" -lt 1500 ]; then
              SPEED="🏇"
            elif [ "$LATENCY" -lt 2000 ]; then
              SPEED="🐢"
            else
              SPEED="🐌"
            fi

          else
            SPEED="⚠"
          fi

          # ==================================
          # Current uptime snapshot
          # ==================================

          UPTIME=$(jq -r \
            --arg site "$SITE" \
            '.[] | select(.name == $site) | .uptime' \
            "$FILE")

          # ==================================
          # Downtime duration calculation
          # ==================================

          DIFF=0
          DURATION="N/A"

          if [ "$ACTION" = "closed" ]; then

            START=$(date -d "$CREATED" +%s)
            END=$(date -d "$CLOSED" +%s)

            DIFF=$((END - START))

            HOURS=$((DIFF / 3600))
            MINS=$(((DIFF % 3600) / 60))

            if [ "$HOURS" -gt 0 ]; then
              DURATION="${HOURS}h ${MINS}m"
            else
              DURATION="${MINS} mins"
            fi

          fi

          # ==================================
          # Severity classification
          # ==================================
          #
          # Based on:
          # - latency
          # - downtime duration
          # ==================================

          if [ "$ACTION" = "opened" ]; then

            if [[ "$LATENCY" =~ ^[0-9]+$ ]]; then

              if [ "$LATENCY" -lt 1000 ]; then
                SEVERITY="⚠ Minor Incident"
              elif [ "$LATENCY" -lt 2500 ]; then
                SEVERITY="🚨 Major Incident"
              else
                SEVERITY="🛑 Critical Incident"
              fi

            else
              SEVERITY="🛑 Critical Incident"
            fi

          else

            if [ "$DIFF" -lt 900 ]; then
              SEVERITY="⚠ Minor Recovery"
            elif [ "$DIFF" -lt 3600 ]; then
              SEVERITY="🚨 Major Recovery"
            else
              SEVERITY="🛑 Critical Recovery"
            fi

          fi

          # ==================================
          # Jitter / degradation indicator
          # ==================================

          JITTER="Stable"

          if [[ "$LATENCY" =~ ^[0-9]+$ ]]; then

            if [ "$LATENCY" -gt 2000 ]; then
              JITTER="High instability"
            elif [ "$LATENCY" -gt 1000 ]; then
              JITTER="Degraded"
            elif [ "$LATENCY" -gt 500 ]; then
              JITTER="Moderate"
            fi

          fi

          # ==================================
          # MTTR + incident tracking
          # ==================================
          #
          # MTTR:
          # Mean Time To Recovery
          #
          # Used for operational reliability
          # tracking.
          # ==================================

          INCIDENTS=$(jq -r \
            --arg slug "$SLUG" \
            '.[$slug].incidents // 0' \
            "$METRICS_FILE")

          TOTAL_DOWNTIME=$(jq -r \
            --arg slug "$SLUG" \
            '.[$slug].downtime // 0' \
            "$METRICS_FILE")

          if [ "$ACTION" = "closed" ]; then

            INCIDENTS=$((INCIDENTS + 1))
            TOTAL_DOWNTIME=$((TOTAL_DOWNTIME + DIFF))

            MTTR=$((TOTAL_DOWNTIME / INCIDENTS))

            jq \
              --arg slug "$SLUG" \
              --argjson incidents "$INCIDENTS" \
              --argjson downtime "$TOTAL_DOWNTIME" \
              --argjson mttr "$MTTR" \
              '.[$slug].incidents = $incidents |
               .[$slug].downtime = $downtime |
               .[$slug].mttr = $mttr' \
              "$METRICS_FILE" > tmp.json && mv tmp.json "$METRICS_FILE"

          else

            MTTR=$(jq -r \
              --arg slug "$SLUG" \
              '.[$slug].mttr // 0' \
              "$METRICS_FILE")

          fi

          # ==================================
          # Human-readable MTTR
          # ==================================

          MTTR_MIN=$((MTTR / 60))

          # ==================================
          # Local + UTC timestamps
          # ==================================

          LOCAL_TIME=$(TZ="$SUMMARY_TIMEZONE" \
            date +"%d %b %Y | %I:%M %p %Z")

          UTC_TIME=$(TZ="UTC" \
            date +"%H:%M UTC")

          # ==================================
          # DOWN EVENT
          # ==================================

          if [ "$ACTION" = "opened" ]; then

            MSG="$SEVERITY\n\n"

            MSG+="🌐 Site: $SITE\n"
            MSG+="📡 Status: DOWN\n"
            MSG+="📈 Uptime: $UPTIME\n"

            if [[ "$LATENCY" =~ ^[0-9]+$ ]]; then
              MSG+="$SPEED Last latency: $LATENCY ms\n"
            fi

            MSG+="📊 Health: $JITTER\n"
            MSG+="📉 Incident Count: $INCIDENTS\n"
            MSG+="📘 MTTR: ${MTTR_MIN} mins\n"
            MSG+="#Incident-$NUMBER\n\n"

            MSG+="🔗 Incident: $INCIDENT_URL\n"
            MSG+="🔗 Status: $STATUS_URL\n\n"

          # ==================================
          # RECOVERY EVENT
          # ==================================

          else

            MSG="✅ SERVICE RECOVERED\n\n"

            MSG+="🌐 Site: $SITE\n"
            MSG+="📡 Status: HEALTHY\n"
            MSG+="📈 Uptime: $UPTIME\n"

            if [[ "$LATENCY" =~ ^[0-9]+$ ]]; then
              MSG+="$SPEED Current latency: $LATENCY ms\n"
            fi

            MSG+="📊 Health: $JITTER\n"
            MSG+="⏱ Downtime: $DURATION\n"
            MSG+="📉 Incident Count: $INCIDENTS\n"
            MSG+="📘 MTTR: ${MTTR_MIN} mins\n"
            MSG+="#Incident-$NUMBER\n\n"

            MSG+="🔗 Incident: $INCIDENT_URL\n"
            MSG+="🔗 Status: $STATUS_URL\n\n"

          fi

          MSG+="🕒 $LOCAL_TIME\n"
          MSG+="🌍 $UTC_TIME"

          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo -e "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ====================================
      # Send Telegram alert
      # ====================================

      - name: Send Telegram
        run: |

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.build.outputs.msg }}" \
            --argjson thread_id ${{ secrets.ALERTS_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # ====================================
      # Persist metrics state
      # ====================================
      #
      # Saves updated MTTR + incident data.
      # ====================================

      - name: Commit metrics
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add history/incident-metrics.json

          git diff --cached --quiet || git commit -m "Update incident metrics"

          git push

  # ========================================
  # WEEKLY INCIDENT REPORT
  # ========================================
  #
  # Sends weekly operational summary:
  # - top failing services
  # - incident frequency
  # - MTTR statistics
  # ========================================

  weekly-report:

    if: github.event_name == 'schedule'

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      # ====================================
      # Build weekly analytics report
      # ====================================

      - name: Build weekly report
        id: report

        env:
          SUMMARY_TIMEZONE: ${{ secrets.SUMMARY_TIMEZONE }}

        run: |

          FILE="history/incident-metrics.json"

          REPORT="📊 Weekly Incident Report\n\n"

          TOP=$(jq -r '
            to_entries
            | sort_by(-.value.incidents)
            | .[:5]
            | .[]
            | "\(.key)|\(.value.incidents)|\(.value.mttr // 0)"
          ' "$FILE")

          INDEX=1

          while IFS="|" read -r SITE INCIDENTS MTTR; do

            [ -z "$SITE" ] && continue

            REPORT+="$INDEX. 🌐 $SITE\n"
            REPORT+="   📉 Incidents: $INCIDENTS\n"
            REPORT+="   📘 MTTR: $((MTTR / 60)) mins\n\n"

            INDEX=$((INDEX+1))

          done <<< "$TOP"

          LOCAL_TIME=$(TZ="$SUMMARY_TIMEZONE" \
            date +"%d %b %Y | %I:%M %p %Z")

          REPORT+="🕒 $LOCAL_TIME"

          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ====================================
      # Send weekly Telegram report
      # ====================================

      - name: Send weekly report
        run: |

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.report.outputs.msg }}" \
            --argjson thread_id ${{ secrets.ALERTS_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
