# ==========================================
# UPPTIME CONFIGURATION
# ==========================================
#
# Main configuration file for:
# - uptime monitoring
# - status website generation
# - README generation
# - GitHub Actions workflows
#
# File:
# .upptimerc.yml
#
# ==========================================

# ==========================================
# Repository owner + repo name
# ==========================================
# Change these first
owner: Sumit-SC # Your GitHub organization or username, where this repository lives
repo: ping # The name of this repository

# Add this section to change the frequency
workflow-schedule:
  uptime: "*/15 * * * *"

# # Global settings (applies to all sites)
# user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

# ==========================================
# Sites to monitor
# ==========================================
sites:
  - name: Portfolio Page
    url: https://sumit-sc.github.io
    icon: https://i.ibb.co/ZpH1RStQ/business-1991029.png
    # method: GET  # Force GET request (HEAD is often blocked)
    # headers:
    #   - "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8"
    #   - "Accept-Language: en-US,en;q=0.5"
    #   - "Cache-Control: no-cache"
    #   - "Pragma: no-cache"
  - name: Personal-Lab
    url: http://www.colab.indevs.in
    icon: https://i.ibb.co/k6GgHg8J/photo-2026-02-13-17-47-19.jpg
  - name: Portfolio Website
    url: https://www.sumit.indevs.in
    icon: https://i.ibb.co/yF29Pd46/icon.png
  - name: Google
    url: https://www.google.com
  - name: Wikipedia
    url: https://en.wikipedia.org
  - name: Streamio
    url: https://idx.theworkpc.com
    icon: https://i.postimg.cc/XqWnmDXr/Picsart-25-10-09-08-09-45-867.png
    # Offline Site to test for outage alert-checks
  # - name: Shoppingssss
  #   url: https//Shopping.com
  # - name: testasssa
  #   url: https://example.koj.co
  # - name: my-web
  #   url: test.com
  #
# ==========================================
# Status website configuration
# ==========================================
    
status-website:
  # 1. Your custom domain
  cname: status.sumit.indevs.in
  # 2. MUST be / when using a custom domain
  baseUrl: /
  # 3. Logo and naming
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: "Sumit's Portfolio | Service Status"
  introTitle: "**Service Status** for my web applications, powered by Upptime and a status page, powered entirely by GitHub."
  introMessage: |
    Real-time infrastructure monitoring powered by:
    - Upptime
    - GitHub Actions
    - Telegram alerting
    - Observability analytics
    • This page monitors the uptime and response time of my portfolio and core services.

#   name: 'Sumit’s Portfolio<br />Service Status'
# status-website:
#   # Add your custom domain name, or remove the `cname` line if you don't have a domain
#   # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
#   # cname: demo.upptime.js.org
#   # baseUrl: /your-repo-name
#   baseUrl: /ping
#   logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
#   # name: "Sumit's Portfolio<br />Service Status"
  
  navbar:
    - title: Portfolio Website
      href: https://www.sumit.indevs.in
    - title: Server Stats
      href: https://telemetry.indevs.in
    - title: WebPages Monitor
      href: https://sumit.betteruptime.com
    # - title: GitHub
    #   href: https://github.com/$OWNER/$REPO
    # - title: Upp-time 
    #   href: https://upptime.js.org/
    #   # This is the subtitle that appears below the name
    #   sub: Build your own website tracker
    - title: Upp-time
      href: https://upptime.js.org/

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
# Advanced monitoring frequency (optional)
# commitMessages:
# readmeTick: ":green_heart: Update uptime [skip ci]"
# ==========================================
# Commit messages
# ==========================================

commitMessages:

  commitAuthorName: "observability-bot"

  commitAuthorEmail: "actions@github.com"

  summary: "📊 Update infrastructure summary"

  statusChange: "📡 {{name}} is {{status}}"

# ==========================================
# Advanced monitoring settings
# ==========================================

i18n:

  activeIncidents: Active Incidents

  allSystemsOperational: All systems operational

  incidentReport: Incident Report

  activeIncidentSummary: |
    Opened at {{date}}
    with {{upptime}}

# ==========================================
# Response time chart settings
# ==========================================

skipDescriptionUpdate: false

skipTopicsUpdate: false

skipHomepageUpdate: false

skipStatusWebsiteUpdate: false

skipReadme: false

skipGraphs: false

# ==========================================
# CUSTOM OBSERVABILITY NOTES
# ==========================================
#
# Your custom workflows:
#
# - summary.yml
# - latency-alerts.yml
# - incident-alerts.yml
#
# are separate from Upptime core.
#
# Keep custom logic inside:
#
# observability/
#
# NOT history/
#
# ==========================================
# ==========================================
# OPTIONAL:
# Custom status website theme
# ==========================================

theme: dark

# ==========================================
# README TEMPLATE SUPPORT
# ==========================================
#
# IMPORTANT:
# Create:
#
# README.tpl
#
# So Upptime does NOT erase
# your custom README sections.
#
# ==========================================
